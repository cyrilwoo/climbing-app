      // Persist team do localStorage + Firestore (sdílený seznam včetně hostů)
      React.useEffect(() => {
        try { localStorage.setItem('climbing-team', JSON.stringify(team)); } catch {}
        if (!firebaseReady) return;
        const t = setTimeout(() => {
          skipFirebaseTeam.current = true;
          db.collection('team').doc('roster').set({ names: team }).catch(() => {});
        }, 800);
        return () => clearTimeout(t);
      }, [team, firebaseReady]);

      // Přidání hostujícího stavěče
      function confirmHost() {
        const trimmed = hostInput.trim();
        if (!trimmed) { setAddingHost(false); setHostInput(''); return; }
        // duplicitní jméno ignorujeme
        if (!team.includes(trimmed)) setTeam(t => [...t, trimmed]);
        setHostInput('');
        setAddingHost(false);
      }
      function cancelHost() { setHostInput(''); setAddingHost(false); }
      // Auto-focus inputu, když se otevře
      React.useEffect(() => { if (addingHost) hostInputRef.current?.focus(); }, [addingHost]);

      function deleteClimber(name) {
        setTeam(t => t.filter(x => x !== name));
        if (sel === name) setSel(null);
        setData(d => {
          const out = {};
          for (const [k,w] of Object.entries(d)) {
            const nullify = v => v === name ? null : v;
            const nullifyArr = a => (a || []).map(nullify);
            const filterArr = a => (a || []).filter(x => x !== name);
            out[k] = {
              ...w,
              monday:    nullifyArr(w.monday),
              mondayLano: nullify(w.mondayLano),
              wednesday: nullifyArr(w.wednesday),
              thursday:  nullifyArr(w.thursday),
              mondaySundavaci: filterArr(w.mondaySundavaci),
              mondayMyti: nullify(w.mondayMyti),
              wednesdaySundavaci: filterArr(w.wednesdaySundavaci),
              wednesdayMyti: nullify(w.wednesdayMyti),
              // preserve saved/cancelled arrays too
              monSavedSetters: nullifyArr(w.monSavedSetters),
              monSavedLano: nullify(w.monSavedLano),
              monSavedSundavaci: filterArr(w.monSavedSundavaci),
              monSavedMyti: nullify(w.monSavedMyti),
              wedSavedSetters: nullifyArr(w.wedSavedSetters),
              wedSavedSundavaci: filterArr(w.wedSavedSundavaci),
              wedSavedMyti: nullify(w.wedSavedMyti),
              monCancelledSetters: nullifyArr(w.monCancelledSetters),
              monCancelledLano: nullify(w.monCancelledLano),
              monCancelledSundavaci: filterArr(w.monCancelledSundavaci),
              monCancelledMyti: nullify(w.monCancelledMyti),
              wedCancelledSetters: nullifyArr(w.wedCancelledSetters),
              wedCancelledSundavaci: filterArr(w.wedCancelledSundavaci),
              wedCancelledMyti: nullify(w.wedCancelledMyti),
            };
          }
          return out;
        });
      }

      // ── Drag ──────────────────────────────────────────────────────────────
      function onDragStartPool(name) { setDrag({ from:'pool', climber:name }); setSel(null); }
      function onDragStartSlot(session, idx, name) { setDrag({ from:'slot', climber:name, session, idx }); }
      function onDragStartLano(name) { if (name) setDrag({ from:'lano', climber:name }); }

      function onDropSlot(session, idx) {
        if (!drag) return;
        const { from, climber, session: src, idx: srcIdx } = drag;
        setDrag(null);
        if (from === 'pool') {
          assign(climber, session, idx);
        } else if (from === 'lano') {
          // lano → regular slot
          const dstArr = week[session] || E4();
          if (dstArr[idx] != null) return;
          setWeek({ ...week, mondayLano: null,
            [session]: dstArr.map((s,i) => i===idx ? climber : s) });
        } else {
          const dstArr = week[session] || E4();
          const srcArr = week[src] || E4();
          if (src === session) {
            if (idx === srcIdx || dstArr[idx] != null) return;
            const s = [...dstArr]; s[srcIdx]=null; s[idx]=climber;
            setWeek({ ...week, [session]: s });
          } else {
            // cross-session drag: remove from source, assign to target in one update
            if (dstArr[idx] != null) return;
            if (dstArr.includes(climber)) return;
            const newSrc = [...srcArr]; newSrc[srcIdx] = null;
            const newDst = [...dstArr]; newDst[idx] = climber;
            setWeek({ ...week, [src]: newSrc, [session]: newDst });
          }
        }
      }
      function onDropLano() {
        if (!drag) return;
        const { from, climber, session: src, idx: srcIdx } = drag;
        setDrag(null);
        if (from === 'pool') {
          assign(climber, 'mondayLano', 0);
        } else if (from === 'slot') {
          if (week.mondayLano != null) return; // != handles both null a undefined
          const s = [...(week[src] || E4())]; s[srcIdx] = null;
          setWeek({ ...week, [src]: s, mondayLano: climber });
        }
      }
      function onDropPool() {
        if (!drag) return;
        if (drag.from === 'slot') remove(drag.session, drag.idx);
        else if (drag.from === 'lano') remove('mondayLano', 0);
        setDrag(null);
      }

      // ── Statistics ────────────────────────────────────────────────────────
      function computeStats() {
        const now = new Date();
        const thisYear  = now.getFullYear();
        const thisMonth = now.getMonth(); // 0-indexed
        const stats = {};
        TEAM.forEach(n => { stats[n] = { month: 0, year: 0, lanoMonth: 0, lanoYear: 0 }; });

        function countWeek(wd, defaultMonDate, calEntry) {
          const effectiveMon = wd.monDateOverride ? new Date(wd.monDateOverride + 'T12:00:00') : addDays(defaultMonDate, lanovkaOffset(defaultMonDate));
          const effWedSector = wd.wedSectorOverride?.sector ?? calEntry?.wed?.sector;
          const wOff = limitOffset(defaultMonDate, effWedSector);
          const effectiveWed = wd.wedDateOverride ? new Date(wd.wedDateOverride + 'T12:00:00') : addDays(defaultMonDate, wOff);
          function tally(name, date) {
            if (!name || !stats[name]) return;
            if (date.getFullYear() === thisYear) {
              stats[name].year++;
              if (date.getMonth() === thisMonth) stats[name].month++;
            }
          }
          function tallyLano(name, date) {
            if (!name || !stats[name]) return;
            if (date.getFullYear() === thisYear) {
              stats[name].lanoYear++;
              if (date.getMonth() === thisMonth) stats[name].lanoMonth++;
            }
          }
          (wd.monday || []).forEach(s => tally(s, effectiveMon));
          tallyLano(wd.mondayLano, effectiveMon);  // lano zvlášť
          (wd.wednesday || []).forEach(s => tally(s, effectiveWed));
          const effectiveThu = wd.thuDateOverride ? new Date(wd.thuDateOverride + 'T12:00:00') : addDays(defaultMonDate, 3);
          (wd.thursday || []).forEach(s => tally(s, effectiveThu));
        }

        // All weeks from CAL — only count weeks where user has explicitly saved data
        // (initWeek adds Cyril as default setter which would inflate his stats)
        Object.keys(CAL).forEach(k => {
          if (!data[k]) return;
          const [y, m, d] = k.split('-').map(Number);
          const monDate = new Date(y, m-1, d);
          countWeek(data[k], monDate, CAL[k]);
        });
        // Any user-edited weeks outside CAL
        Object.keys(data).forEach(k => {
          if (!CAL[k]) {
            const [y, m, d] = k.split('-').map(Number);
            countWeek(data[k], new Date(y, m-1, d), null);
          }
        });
        // Závody — počítáme stavěče do roční/měsíční statistiky (závod + dostavba)
        const tallyRaceSetters = (setters, raceDate) => {
          (setters || []).forEach(name => {
            if (!name || !stats[name]) return;
            if (raceDate.getFullYear() === thisYear) {
              stats[name].year++;
              if (raceDate.getMonth() === thisMonth) stats[name].month++;
            }
          });
        };
        Object.values(races || {}).forEach(race => {
          if (!race?.date) return;
          tallyRaceSetters(race.setters, new Date(race.date + 'T12:00:00'));
          (race.dostavba || []).forEach(day => {
            if (!day?.date) return;
            tallyRaceSetters(day.setters, new Date(day.date + 'T12:00:00'));
          });
        });
        return stats;
      }

      function computeRemovalStats() {
        const now = new Date();
        const thisYear  = now.getFullYear();
        const thisMonth = now.getMonth();
        const stats = {};
        REMOVAL_TEAM.forEach(n => { stats[n] = { sundMonth: 0, sundYear: 0, mytiMonth: 0, mytiYear: 0 }; });
        function tally(name, date, field) {
          if (!name || !stats[name]) return;
          if (date.getFullYear() === thisYear) {
            stats[name][field + 'Year']++;
            if (date.getMonth() === thisMonth) stats[name][field + 'Month']++;
          }
        }
        // Only count weeks where user has saved data (same reason as computeStats)
        const allKeys = new Set(Object.keys(data));
        allKeys.forEach(k => {
          const [y, m, d] = k.split('-').map(Number);
          const monBase = new Date(y, m-1, d);  // pondělí týdne (week start)
          const wd = data[k];
          const effWedSector = wd.wedSectorOverride?.sector ?? CAL[k]?.wed?.sector;
          const wOff = limitOffset(monBase, effWedSector);
          const wedDate = wd.wedDateOverride ? new Date(wd.wedDateOverride) : addDays(monBase, wOff);
          const lanDate = wd.monDateOverride ? new Date(wd.monDateOverride) : addDays(monBase, lanovkaOffset(monBase));
          const sundMon = addDays(lanDate, -1);
          const sundWed = addDays(wedDate, -1);
          (wd.mondaySundavaci || []).forEach(n => tally(n, sundMon, 'sund'));
          tally(wd.mondayMyti, sundMon, 'myti');
          (wd.wednesdaySundavaci || []).forEach(n => tally(n, sundWed, 'sund'));
          tally(wd.wednesdayMyti, sundWed, 'myti');
        });
        // Závody — sundavání den před závodem
        Object.values(races || {}).forEach(race => {
          if (!race?.date) return;
          const sundDate = addDays(new Date(race.date + 'T12:00:00'), -1);
          (race.sundavaci || []).forEach(n => tally(n, sundDate, 'sund'));
          tally(race.myti, sundDate, 'myti');
        });
        return stats;
      }

      const isNow = offset === 0;

      return (
        <div className="min-h-screen bg-slate-100 pt-24">

          {/* Header */}
          <header className="bg-white border-b border-gray-200 fixed top-0 left-0 right-0 w-full z-50 shadow-sm">
            <div className="max-w-[60rem] mx-auto px-4 pt-3 pb-2">
              {/* Top row: title + navigation */}
              <div className="flex items-center justify-between gap-3">
                <div className="flex items-center gap-3 min-w-0">
                  <div className="min-w-0">
                    <p className="text-base font-bold text-gray-900 leading-none">Stavění</p>
                    <p className="text-xs text-gray-400 mt-0.5">Týdenní plán stavěčů</p>
                  </div>
                </div>
              <div className="flex items-center gap-0.5 flex-shrink-0">
                <button onClick={() => shiftMonth(-1)} title="O měsíc zpět"
                  className="p-1.5 rounded-xl hover:bg-gray-100 text-gray-400 hover:text-gray-700 transition-colors">
                  <ChevronsLeft c="w-5 h-5" />
                </button>
                <button onClick={() => setOffset(o => o-1)} title="O týden zpět"
                  className="p-1.5 rounded-xl hover:bg-gray-100 text-gray-600 transition-colors">
                  <ChevronLeft c="w-5 h-5" />
                </button>
                <div className="text-center min-w-[124px] px-1">
                  <p className="text-sm font-bold text-gray-900 tabular-nums">
                    {fmt(monday)} – {fmt(friday)}{friday.getFullYear()}
                  </p>
                  <p className={`text-xs font-semibold mt-0.5 ${isNow ? 'text-amber-600' : 'text-gray-400'}`}>
                    {isNow ? 'Aktuální týden' : `Týden ${offset>0?'+':''}${offset}`}
                  </p>
                </div>
                <button onClick={() => setOffset(o => o+1)} title="O týden vpřed"
                  className="p-1.5 rounded-xl hover:bg-gray-100 text-gray-600 transition-colors">
                  <ChevronRight c="w-5 h-5" />
                </button>
                <button onClick={() => shiftMonth(1)} title="O měsíc vpřed"
                  className="p-1.5 rounded-xl hover:bg-gray-100 text-gray-400 hover:text-gray-700 transition-colors">
                  <ChevronsRight c="w-5 h-5" />
                </button>
              </div>
              </div>
              {/* Second row: fill indicators */}
              {(() => {
                // Pomocná: spočítá fill ze závodu/dostavby (replacement objektu)
                const replFill = repl => {
                  if (!repl) return null;
                  const total = repl.kind === 'race' ? (repl.race.slotCount || 0) : (repl.day.slotCount || 0);
                  const setters = repl.kind === 'race' ? (repl.race.setters || []) : (repl.day.setters || []);
                  const filled = setters.slice(0, total).filter(Boolean).length;
                  return { total, filled };
                };

                // Lanovka — pokud Mon nahrazuje závod/dostavba, ukazatel reflektuje obsazenost závodu
                let monMax, monSetterFill;
                if (monReplacement) {
                  const r = replFill(monReplacement);
                  monMax = r.total; monSetterFill = r.filled;
                } else {
                  monMax = calMon?.sector && !calMon.isOff ? getLanovkaSlotCount(calMon.sector) : 0;
                  monSetterFill = monMax ? (week.monday||[]).slice(0,monMax).filter(Boolean).length : 0;
                }
                const monLanoFill = (calMon?.sector && !calMon.isOff && !monReplacement) ? (week.mondayLano ? 1 : 0) : 0;

                // Limit — pokud Wed nahrazuje závod/dostavba, ukazatel reflektuje obsazenost závodu
                let wedMax, wedFill;
                if (wedReplacement) {
                  const r = replFill(wedReplacement);
                  wedMax = r.total; wedFill = r.filled;
                } else {
                  wedMax = calWed?.sector && !calWed.isOff ? getWedSlotCount(calWed.sector) : 0;
                  wedFill = wedMax ? (week.wednesday||[]).slice(0,wedMax).filter(Boolean).length : 0;
                }

                const thuFill = (week.thursday||[]).slice(0,2).filter(Boolean).length;
                const monSetterPct = monMax ? Math.round(monSetterFill/monMax*100) : 0;
                const monLanoPct   = (calMon?.sector && !calMon.isOff && !monReplacement) ? Math.round(monLanoFill*100) : 0;
                const wedPct  = wedMax ? Math.round(wedFill/wedMax*100) : 0;
                const thuPct  = calThu ? Math.round(thuFill/2*100) : 0;
                const monIsRace = !!monReplacement;
                const wedIsRace = !!wedReplacement;
                return (
                  <div className="flex items-center justify-center flex-wrap gap-2 mt-2">
                    <span className={`text-sm font-black px-3 py-1 rounded-full
                      ${monIsRace
                        ? (monSetterFill === monMax && monMax ? 'bg-pink-600 text-white' : monMax ? 'bg-zinc-800 text-white' : 'bg-gray-100 text-gray-400')
                        : monMax && monSetterFill===monMax ? 'bg-gradient-to-br from-amber-400 to-yellow-400 text-gray-900' : monMax ? 'bg-amber-100 text-amber-800' : 'bg-gray-100 text-gray-400'}`}>
                      Lanovka {monSetterPct}%
                    </span>
                    {!monIsRace && (
                      <span className={`text-sm font-black px-3 py-1 rounded-full
                        ${calMon?.sector && !calMon.isOff && monLanoFill===1 ? 'bg-gradient-to-br from-amber-400 to-yellow-400 text-gray-900' : 'bg-gray-100 text-gray-400'}`}>
                        Lano {monLanoPct}%
                      </span>
                    )}
                    <span className={`text-sm font-black px-3 py-1 rounded-full
                      ${wedMax && wedFill===wedMax ? 'bg-pink-600 text-white' : wedMax ? 'bg-zinc-800 text-white' : 'bg-gray-100 text-gray-400'}`}>
                      Limit {wedPct}%
                    </span>
                    {calThu && (
                      <span className={`text-sm font-black px-3 py-1 rounded-full
                        ${thuFill===2 ? 'bg-emerald-600 text-white' : 'bg-emerald-100 text-emerald-800'}`}>
                        Tělocvična {thuPct}%
                      </span>
                    )}
                  </div>
                );
              })()}
            </div>
          </header>

          <main className="px-4 py-5 pb-10 flex flex-col lg:flex-row gap-5 items-start">

            {/* Invisible spacer: mirrors stats width → cards appear centered */}
            <div className="hidden lg:block lg:w-64 lg:flex-shrink-0" />

            {/* Main content column */}
            <div className="flex-1 min-w-0 space-y-4">

            {/* Řádky 1+2: Sundavání + Stavění — jeden scroll container */}
            <div className="overflow-x-auto snap-x snap-mandatory lg:overflow-visible lg:snap-none relative z-0">
              <div className="flex flex-col gap-4 w-fit lg:w-full">

                {/* Slot-based render: každý slot má Sundavání nahoře + Stavění dole, vázané pozičně */}
                {(() => {
                  // Max 3 karty vedle sebe (každá 1/3 šířky); 4. a další wrapuje na další řádek a vystředí se
                  const cardClass = "w-[calc(100vw-2rem)] flex-shrink-0 snap-start lg:w-auto lg:flex-shrink lg:flex-grow-0 lg:basis-[calc((100%-2rem)/3)] lg:max-w-[calc((100%-2rem)/3)]";
                  const renderRaceSund = race => (
                    <SundavaniCard
                      session={`race-${race.date}`} theme="dark"
                      date={addDays(new Date(race.date + 'T12:00:00'), -1)}
                      sundavaci={race.sundavaci || []} myti={race.myti || null}
                      onToggleSundavac={n => toggleRaceSundavac(race.date, n)}
                      onToggleMyti={n => toggleRaceMyti(race.date, n)} />
                  );
                  const renderReplacementStavba = repl => (
                    <RaceCard
                      kind={repl.kind}
                      race={repl.race}
                      day={repl.day}
                      sel={sel}
                      onSlotClick={i => repl.kind === 'race'
                        ? onRaceSlotClick(repl.race.date, i)
                        : onDostavbaSlotClick(repl.race.date, repl.dIdx, i)}
                      onDragStartSlot={() => {}}
                      onDragOverSlot={e => e.preventDefault()}
                      onDropSlot={() => {}}
                      onDelete={repl.kind === 'race' ? () => deleteRace(repl.race.date) : undefined} />
                  );

                  const slots = [];
                  // Mon
                  if (monReplacement) {
                    slots.push({
                      stavba: renderReplacementStavba(monReplacement),
                      sundavani: monReplacement.kind === 'race' ? renderRaceSund(monReplacement.race) : null,
                    });
                  } else {
                    slots.push({
                      stavba: <SessionCard
                        session="monday" day="Pondělí" date={monDate} theme="yellow"
                        slots={week.monday} lanoSlot={week.mondayLano} calInfo={calMon}
                        sel={sel}
                        onSlotClick={i => onSlotClick('monday', i)}
                        onDragStartSlot={(i,n) => onDragStartSlot('monday',i,n)}
                        onDragOverSlot={e => e.preventDefault()}
                        onDropSlot={i => onDropSlot('monday', i)}
                        onLanoClick={onLanoClick}
                        onDragStartLano={onDragStartLano}
                        onDropLano={onDropLano}
                        onClear={() => clearSession('monday')}
                        onDateChange={setMonDate}
                        onShift={shiftMonSector}
                        nextSector={getNextSector(key, 'mon')} />,
                      sundavani: (calMon != null && !calMon.isOff)
                        ? <SundavaniCard session="monday" theme="yellow" date={addDays(monDate, -1)}
                            sundavaci={week.mondaySundavaci || []} myti={week.mondayMyti || null}
                            onToggleSundavac={name => toggleSundavac('monday', name)}
                            onToggleMyti={name => toggleMyti('monday', name)} />
                        : null,
                    });
                  }
                  // Wed
                  if (wedReplacement) {
                    slots.push({
                      stavba: renderReplacementStavba(wedReplacement),
                      sundavani: wedReplacement.kind === 'race' ? renderRaceSund(wedReplacement.race) : null,
                    });
                  } else {
                    slots.push({
                      stavba: <SessionCard
                        session="wednesday" day={isDetskaWed(calWed?.sector) ? "Čtvrtek" : "Středa"} date={wedDate} theme="dark"
                        slots={week.wednesday} calInfo={calWed}
                        sel={sel}
                        onSlotClick={i => onSlotClick('wednesday', i)}
                        onDragStartSlot={(i,n) => onDragStartSlot('wednesday',i,n)}
                        onDragOverSlot={e => e.preventDefault()}
                        onDropSlot={i => onDropSlot('wednesday', i)}
                        onClear={() => clearSession('wednesday')}
                        onDateChange={setWedDate}
                        onShift={shiftWedSector}
                        nextSector={getNextSector(key, 'wed')} />,
                      sundavani: (calWed != null && !calWed.isOff)
                        ? <SundavaniCard session="wednesday" theme="dark" date={addDays(wedDate, -1)}
                            sundavaci={week.wednesdaySundavaci || []} myti={week.wednesdayMyti || null}
                            onToggleSundavac={name => toggleSundavac('wednesday', name)}
                            onToggleMyti={name => toggleMyti('wednesday', name)} />
                        : null,
                    });
                  }
                  // Thu (jen pokud je v týdnu)
                  if (calThu) {
                    slots.push({
                      stavba: <SessionCard
                        session="thursday" day="Čtvrtek" date={thuDate} theme="green"
                        slots={week.thursday || E4()} calInfo={calThu}
                        sel={sel}
                        onSlotClick={i => onThuSlotClick(i)}
                        onDragStartSlot={(i,n) => onDragStartSlot('thursday',i,n)}
                        onDragOverSlot={e => e.preventDefault()}
                        onDropSlot={i => onDropSlot('thursday', i)}
                        onClear={() => clearSession('thursday')}
                        onDateChange={setThuDate} />,
                      sundavani: null,
                    });
                  }
                  // Extras — neumístěné race/dostavba dny — připojeny jako další sloty do stejného řádku
                  _remainingWeekItems.forEach(item => {
                    if (item.kind === 'race') {
                      slots.push({
                        stavba: <RaceCard
                          race={item.race}
                          sel={sel}
                          onSlotClick={i => onRaceSlotClick(item.race.date, i)}
                          onDragStartSlot={() => {}}
                          onDragOverSlot={e => e.preventDefault()}
                          onDropSlot={() => {}}
                          onDelete={() => deleteRace(item.race.date)} />,
                        sundavani: renderRaceSund(item.race),
                      });
                    } else {
                      slots.push({
                        stavba: <RaceCard
                          kind="dostavba"
                          race={item.race}
                          day={item.day}
                          sel={sel}
                          onSlotClick={i => onDostavbaSlotClick(item.race.date, item.dIdx, i)}
                          onDragStartSlot={() => {}}
                          onDragOverSlot={e => e.preventDefault()}
                          onDropSlot={() => {}} />,
                        sundavani: null,
                      });
                    }
                  });

                  const hasSundavani = slots.some(s => s.sundavani != null);
                  return (
                    <>
                      {hasSundavani && (
                        <div className="flex gap-4 lg:flex-wrap lg:justify-center items-start">
                          {slots.map((s, i) => (
                            <div key={`sund-${i}`} className={cardClass}>
                              {s.sundavani}
                            </div>
                          ))}
                        </div>
                      )}
                      <div className="flex gap-4 lg:flex-wrap lg:justify-center items-start">
                        {slots.map((s, i) => (
                          <div key={`stav-${i}`} className={cardClass}>
                            {s.stavba}
                          </div>
                        ))}
                      </div>
                    </>
                  );
                })()}

              </div>
            </div>

            {/* Climber pool */}
            <div className="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden"
              onDragOver={e => e.preventDefault()} onDrop={onDropPool}>

              <div className="px-4 pt-4 pb-3 border-b border-gray-100">
                <div className="flex items-center justify-between mb-3">
                  <h2 className="font-bold text-gray-900 flex items-center gap-2">
                    <UserIcon c="w-4 h-4 text-gray-400" />
                    Stavěči
                    <span className="text-xs font-semibold text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">
                      {team.length}
                    </span>
                  </h2>
                  <div className="flex items-center gap-2">
                    {sel && (
                      <span className="hidden sm:flex items-center gap-1 text-xs font-semibold text-gray-700 bg-gray-100 border border-gray-200 px-2.5 py-1 rounded-full">
                        <Check c="w-3 h-3" />{sel}
                      </span>
                    )}
                  </div>
                </div>
              </div>

              <div className="px-4 py-3 flex flex-wrap gap-2 min-h-[64px] justify-center items-start content-start">
                {team.map(name => (
                    <ClimberChip key={name} name={name}
                      isSelected={sel === name}
                      inMon={isMonday(name)}
                      inWed={isWednesday(name)}
                      isHost={!TEAM.includes(name)}
                      onClick={() => onChipClick(name)}
                      onRemove={() => deleteClimber(name)}
                      onDragStart={() => onDragStartPool(name)} />
                  ))
                }
                {/* Host — přidání hostujícího stavěče */}
                {addingHost ? (
                  <form onSubmit={e => { e.preventDefault(); confirmHost(); }}
                    className="inline-flex items-center gap-1 pl-2.5 pr-1 py-1 rounded-full border border-pink-400 bg-pink-50 shadow-sm">
                    <UserIcon c="w-5 h-5 flex-shrink-0 text-pink-400" />
                    <input ref={hostInputRef} type="text" value={hostInput}
                      onChange={e => setHostInput(e.target.value)}
                      onKeyDown={e => { if (e.key === 'Escape') cancelHost(); }}
                      placeholder="Jméno hosta…" maxLength={30}
                      className="text-sm font-semibold italic bg-transparent outline-none w-28 text-pink-800 placeholder-pink-400 placeholder:font-medium placeholder:not-italic" />
                    <button type="submit" disabled={!hostInput.trim()} title="Přidat"
                      className="p-1 rounded-full text-pink-600 hover:bg-pink-100 disabled:opacity-30 disabled:hover:bg-transparent">
                      <Check c="w-4 h-4" />
                    </button>
                    <button type="button" onClick={cancelHost} title="Zrušit"
                      className="p-1 rounded-full text-gray-400 hover:text-gray-600 hover:bg-gray-100">
                      <X c="w-3.5 h-3.5" />
                    </button>
                  </form>
                ) : (
                  <button onClick={() => setAddingHost(true)} title="Přidat hostujícího stavěče"
                    className="inline-flex items-center gap-1.5 pl-2.5 pr-3 py-1.5 rounded-full border border-dashed border-pink-300 text-pink-600 text-sm font-semibold hover:bg-pink-50 hover:border-pink-400 transition-colors">
                    <Plus c="w-3.5 h-3.5" />
                    Host
                  </button>
                )}
              </div>

              {/* Stats — mobile only, na desktopu jsou v pravém sidebaru */}
              <div className="lg:hidden px-4 pb-2 space-y-3">
                <MonthlyOccupancy data={data} viewMonday={monday} />
                <RacesPanel races={races} />
                <StatsPanel stats={computeStats()} team={team} />
                <RemovalStatsPanel stats={computeRemovalStats()} />
              </div>

              {drag && (
                <div className="mx-4 mb-3 border-2 border-dashed border-red-200 rounded-xl px-4 py-2.5 text-center text-xs font-medium text-red-400 bg-red-50">
                  Přetáhněte sem pro odebrání ze slotu
                </div>
              )}
              {sel && (
                <div className="mx-4 mb-3 border border-amber-100 rounded-xl px-4 py-2.5 text-center text-xs font-medium text-amber-700 bg-amber-50">
                  Klikněte na volný slot pro přiřazení &nbsp;
                  <button onClick={() => setSel(null)} className="underline underline-offset-2 text-amber-500 hover:text-amber-700">
                    Zrušit
                  </button>
                </div>
              )}
            </div>

            {/* Year plan (Rotace + Roční kalendář) — collapsible, defaultně sbalené */}
            <details className="group bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
              <summary className="px-4 py-3 cursor-pointer flex items-center justify-between hover:bg-gray-50 transition-colors list-none">
                <span className="font-bold text-gray-900 text-sm flex items-center gap-2">
                  <span className="text-gray-400 text-xs uppercase tracking-widest">Rotace + Roční plán</span>
                </span>
                <span className="text-gray-400 text-xs font-semibold group-open:rotate-180 transition-transform">▼</span>
              </summary>
              <div className="px-4 pb-4 border-t border-gray-100">
                <YearPlan />
              </div>
            </details>

            {/* ── Široké action butony úplně dole — každá akce na celou šířku ──── */}
            {(() => {
              const monLanShift  = calMon && !calMon.isOff && calMon.sector;
              const monLanCancel = calMon && !calMon.isOff && calMon.sector;
              const monLanUndoShift  = week.monSectorOverride?.sector === 'Volný týden' && week.monSavedSetters;
              const monLanUndoCancel = !!week.monCancelledSetters;
              const wedLimShift  = calWed && !calWed.isOff && calWed.sector;
              const wedLimCancel = calWed && !calWed.isOff && calWed.sector;
              const wedLimUndoShift  = week.wedSectorOverride?.sector === 'Volný týden' && week.wedSavedSetters;
              const wedLimUndoCancel = !!week.wedCancelledSetters;
              const nextWk = fmt(addDays(monday, 7));

              // Tlačítko, plní svůj flex container (uvnitř wall rowu vedle sebe = poloviční)
              const wallBtn = (key, cls, onClick, icon, action, sector, suffix) => (
                <button key={key} onClick={onClick}
                  title={`${action}${sector ? ' ' + sector : ''}${suffix ? ' ' + suffix : ''}`}
                  className={`w-full min-w-0 px-3 py-3 rounded-xl text-sm font-black uppercase tracking-wide transition-colors flex items-center justify-center gap-1.5 shadow-sm ${cls}`}>
                  <span className="text-base leading-none flex-shrink-0">{icon}</span>
                  <span className="flex-shrink-0">{action}</span>
                  {sector && <span className="font-bold normal-case tracking-normal truncate min-w-0">"{sector}"</span>}
                  {suffix && <span className="opacity-80 flex-shrink-0">{suffix}</span>}
                </button>
              );

              const hasLanovkaActions = monLanShift || monLanCancel || monLanUndoShift || monLanUndoCancel;
              const hasLimitActions   = wedLimShift || wedLimCancel || wedLimUndoShift || wedLimUndoCancel;

              return (
                <div className="space-y-2">
                  {/* Lanovka vlevo, Limit vpravo. Buttony Posun/Smazat pod sebou v rámci stěny. */}
                  {(hasLanovkaActions || hasLimitActions) && (
                    <div className="flex flex-col lg:flex-row gap-2">
                      {/* LANOVKA — Posun + Smazat pod sebou (žluté gradient) */}
                      {hasLanovkaActions && (
                        <div className="flex-1 flex flex-col gap-2">
                          {monLanShift      && wallBtn('lan-shift',      'bg-gradient-to-br from-amber-400 to-yellow-400 text-gray-900 hover:from-amber-500 hover:to-yellow-500', shiftMonSector,  '↪', 'Posun',        calMon.sector, `→ ${nextWk}`)}
                          {monLanCancel     && wallBtn('lan-cancel',     'bg-gradient-to-br from-amber-400 to-yellow-400 text-gray-900 hover:from-amber-500 hover:to-yellow-500', cancelMonSector, '✕', 'Smazat',       calMon.sector, null)}
                          {monLanUndoShift  && wallBtn('lan-undoshift',  'bg-gradient-to-br from-amber-400 to-yellow-400 text-gray-900 hover:from-amber-500 hover:to-yellow-500', undoMonShift,    '↩', 'Vrátit posun', null,          null)}
                          {monLanUndoCancel && wallBtn('lan-undocancel', 'bg-gradient-to-br from-amber-400 to-yellow-400 text-gray-900 hover:from-amber-500 hover:to-yellow-500', undoMonCancel,   '↩', 'Obnovit',      null,          null)}
                        </div>
                      )}
                      {/* LIMIT — Posun + Smazat pod sebou (černé) */}
                      {hasLimitActions && (
                        <div className="flex-1 flex flex-col gap-2">
                          {wedLimShift      && wallBtn('lim-shift',      'bg-zinc-900 text-white hover:bg-zinc-800',     shiftWedSector,  '↪', 'Posun',        calWed.sector, `→ ${nextWk}`)}
                          {wedLimCancel     && wallBtn('lim-cancel',     'bg-zinc-900 text-white hover:bg-zinc-800',     cancelWedSector, '✕', 'Smazat',       calWed.sector, null)}
                          {wedLimUndoShift  && wallBtn('lim-undoshift',  'bg-zinc-700 text-zinc-200 hover:bg-zinc-600',  undoWedShift,    '↩', 'Vrátit posun', null,          null)}
                          {wedLimUndoCancel && wallBtn('lim-undocancel', 'bg-zinc-700 text-zinc-200 hover:bg-zinc-600',  undoWedCancel,   '↩', 'Obnovit',      null,          null)}
                        </div>
                      )}
                    </div>
                  )}

                  {/* + Přidat závod — vystředěný dole, plná šířka */}
                  <button onClick={() => setShowAddRace(true)}
                    className="w-full px-5 py-3.5 rounded-xl bg-gradient-to-br from-pink-600 to-pink-700 hover:from-pink-500 hover:to-pink-600 text-white text-sm font-black uppercase tracking-widest shadow-sm transition-colors flex items-center justify-center gap-2">
                    <span className="text-lg leading-none">+</span>
                    <span>Přidat závod</span>
                  </button>
                </div>
              );
            })()}

            </div>{/* end main content column */}

            {/* Stats sidebar */}
            <div className="lg:w-64 lg:flex-shrink-0 lg:sticky lg:top-20 space-y-3">
              <div className="hidden lg:block space-y-6">
              {(() => {
                const today = new Date(); today.setHours(0,0,0,0);
                const fmtDate = d => d.toLocaleDateString('cs-CZ', { day: 'numeric', month: 'numeric' });
                const startMonday = getMonday(new Date());
                const upcoming = [];
                for (let w = 0; w < 12 && upcoming.length < 3; w++) {
                  const monday = addDays(startMonday, w * 7);
                  const k = weekKey(monday);
                  const wd = data[k] ?? {};
                  const calMon = wd.monSectorOverride ?? CAL[k]?.mon ?? null;
                  const calWed = wd.wedSectorOverride ?? CAL[k]?.wed ?? null;
                  const calThu = CAL[k]?.thu ?? null;
                  const wedOff = limitOffset(monday, calWed?.sector);
                  const monOff = lanovkaOffset(monday);
                  const monDate = wd.monDateOverride ? new Date(wd.monDateOverride + 'T12:00:00') : addDays(monday, monOff);
                  const wedDate = wd.wedDateOverride ? new Date(wd.wedDateOverride + 'T12:00:00') : addDays(monday, wedOff);
                  const thuDate = wd.thuDateOverride ? new Date(wd.thuDateOverride + 'T12:00:00') : addDays(monday, 3);
                  const sessions = [
                    calMon && !calMon.isOff ? { date: monDate, label: 'Lanovka', sector: calMon.sector, color: 'text-amber-500' } : null,
                    calWed && !calWed.isOff ? { date: wedDate, label: 'Limit',    sector: calWed.sector, color: 'text-pink-500'  } : null,
                    calThu && !calThu.isOff ? { date: thuDate, label: 'Tělocv.',  sector: calThu.sector, color: 'text-emerald-500' } : null,
                  ].filter(Boolean).filter(s => s.date >= today).sort((a,b) => a.date - b.date);
                  for (const s of sessions) { if (upcoming.length < 3) upcoming.push(s); }
                }
                return (
                  <div className="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
                    <div className="px-4 pt-4 pb-2 border-b border-gray-100">
                      <h2 className="font-bold text-gray-900 text-sm">Nadcházející</h2>
                    </div>
                    <div className="p-3 space-y-2">
                      {upcoming.length === 0 && <div className="text-xs text-gray-400">Žádné stavění</div>}
                      {upcoming.map((s, i) => (
                        <div key={i} className="space-y-0.5">
                          <div className={`text-xs font-semibold ${s.color}`}>{fmtDate(s.date)} {s.label}</div>
                          <div className={`text-xs font-black leading-tight ${s.color}`}>{s.sector}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })()}
              <MonthlyOccupancy data={data} viewMonday={monday} />
              <RacesPanel races={races} />
              </div>
              <div className="hidden lg:block space-y-3">
                <StatsPanel stats={computeStats()} team={team} />
                <RemovalStatsPanel stats={computeRemovalStats()} />
              </div>
            </div>

          </main>

          {/* Modal: Přidat závod */}
          {showAddRace && (
            <AddRaceModal
              existingRaceDates={new Set(Object.keys(races || {}))}
              onClose={() => setShowAddRace(false)}
              onSave={addRace} />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
