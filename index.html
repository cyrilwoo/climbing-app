    // ── Date helpers ─────────────────────────────────────────────────────────
    function getMonday(date) {
      const d = new Date(date);
      const day = d.getDay();
      d.setDate(d.getDate() - day + (day === 0 ? -6 : 1));
      d.setHours(0, 0, 0, 0);
      return d;
    }
    const addDays  = (d, n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };

    const fmtFull  = d => `${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}`;
    // Use local date (not UTC) to avoid timezone-shift issues with toISOString()
    const weekKey  = mon => {
      const y = mon.getFullYear();
      const m = String(mon.getMonth()+1).padStart(2,'0');
      const d = String(mon.getDate()).padStart(2,'0');
      return `${y}-${m}-${d}`;
    };

    // ── Team & constants ─────────────────────────────────────────────────────
    const TEAM = ['Cyril', 'Vašek', 'Morčák', 'Kuba', 'Máza', 'Sebastián'];

    // ── Plán stavění 2026 ────────────────────────────────────────────────────
    // Limit rotace (5 týdnů): Dětská (čtvrtek) → Přední převis → Zadní převis → Kolmice → Volno → opakuj
    // Limit START: 2.4.2026 (týden 2026-03-30)
    // Lanovka rotace (5 týdnů): Převis+Bizár → Dole kout+Strop → Nový profil → Hříbek → Dole kolmice → opakuj

    const V  = { sector: null,                           setters: [], isOff: true };
    const D  = { sector: 'Dětská',                       setters: [] };
    const P  = { sector: 'Přední převis',                setters: [] };
    const Z  = { sector: 'Zadní převis',                 setters: [] };
    const K  = { sector: 'Kolmice',                      setters: [] };
    const M  = { sector: null,                           setters: [], lano: null };
    const L1 = { sector: 'Převis + Bizár',               setters: [], lano: null };
    const L2 = { sector: 'Dole kout + Strop',            setters: [], lano: null };
    const L3 = { sector: 'Nový profil + nahoře kolmice', setters: [], lano: null };
    const L4 = { sector: 'Hříbek',                       setters: [], lano: null };
    const L5 = { sector: 'Dole kolmice + převis',        setters: [], lano: null };
    const TG = { sector: 'Tělocvična', setters: [] };
    const isDetskaWed = s => s?.toLowerCase().includes('dět') || s?.toLowerCase().includes('det');
    // Sektory Limitu — pro modal "Přidat závod"
    const LIMIT_SECTORS = ['Dětská', 'Přední převis', 'Zadní převis', 'Kolmice'];

    // Před zářím 2026: Lanovka pondělí (+0), Limit středa (+2) nebo čtvrtek pro Dětskou (+3).
    function isNewSchedule(monday) {
      const y = monday.getFullYear();
      return y > 2026 || (y === 2026 && monday.getMonth() >= 8); // září = index 8
    }
    function lanovkaOffset(monday) {
      return isNewSchedule(monday) ? 1 : 0;
    }
    function limitOffset(monday, sectorName) {
      if (isNewSchedule(monday)) return 3;
      return isDetskaWed(sectorName) ? 3 : 2;
    }
    const CAL = {

      '2026-08-10': {            wed: Z  },

      // ── LEDEN 2027 ───────────────────────────────────────────────
      '2027-01-04': { mon: L3, wed: P },

      '2027-04-05': { mon: L1, wed: V },

      // ── KVĚTEN 2027 ──────────────────────────────────────────────
      '2027-05-03': { mon: L5, wed: K },

      '2027-12-13': { mon: L3, wed: P },
      '2027-12-20': { mon: L4, wed: Z, thu: TG },
      '2027-12-27': { mon: L5, wed: K },
    };

    // Returns the next non-off CAL entry for venue ('mon'|'wed') after weekKey
    function getNextSector(weekKey, venue) {
      const calKeys = Object.keys(CAL).sort();
      const idx = calKeys.indexOf(weekKey);
      for (let i = idx + 1; i < calKeys.length; i++) {
        const entry = CAL[calKeys[i]]?.[venue];
        if (entry && !entry.isOff) return entry;
      }
      return null;
    }

    function initWeek(key) {
      const c = CAL[key];
      if (!c) {
        // default: Cyril in wed slot 1
        return { monday: E4(), mondayLano: null, wednesday: ['Cyril', null, null, null], thursday: E4(),
                 mondaySundavaci: [], mondayMyti: null, wednesdaySundavaci: [], wednesdayMyti: null,
                 thuDateOverride: null, monDateOverride: null, wedDateOverride: null };
      }
      const monday = E4();
      (c.mon?.setters ?? []).slice(0,4).forEach((s,i) => { monday[i] = s; });

      const wednesday = E4();
      if (c.wed?.setters?.length) {
        c.wed.setters.slice(0,4).forEach((s,i) => { wednesday[i] = s; });
      } else if (c.wed && !c.wed.isOff) {
        wednesday[0] = 'Cyril';
      }

      const thursday = E4();
      if (c.thu?.setters?.length) {
        c.thu.setters.slice(0,4).forEach((s,i) => { thursday[i] = s; });
      }
      return { monday, mondayLano: c.mon?.lano ?? null, wednesday, thursday,
               mondaySundavaci: [], mondayMyti: null,
               wednesdaySundavaci: [], wednesdayMyti: null,
               thuDateOverride: null,
               monDateOverride: null, wedDateOverride: null,
               monSectorOverride: null, wedSectorOverride: null };
    }

    // ── SundavaniCard ─────────────────────────────────────────────────────────
    function SundavaniCard({ session, theme, date, sundavaci, myti, onToggleSundavac, onToggleMyti }) {
      const isYellow = theme === 'yellow';
      // Defenzivní: data z Firestore mohou mít chybějící pole (sundavaci undefined)
      const safeSundavaci = Array.isArray(sundavaci) ? sundavaci : [];
      const rawDay = date.toLocaleString('cs-CZ', { weekday: 'long' });
      const displayDay = rawDay.charAt(0).toUpperCase() + rawDay.slice(1);
      const isGreen = theme === 'green';
      const hdr     = isYellow ? 'bg-gradient-to-br from-amber-400 to-yellow-400' : isGreen ? 'bg-gradient-to-br from-emerald-500 to-green-600' : 'bg-[#1e1e20]';
      const hdrText = isYellow ? 'text-gray-900' : 'text-white';
      const hdrSub  = isYellow ? 'text-gray-600' : 'text-white/60';
      const activeBg = isYellow ? 'bg-amber-600 text-white' : isGreen ? 'bg-emerald-600 text-white' : 'bg-pink-600 text-white';
      return (
        <div className="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-200">
          <div className={`${hdr} px-4 py-3`}>
            <div className={`flex items-center justify-between gap-3 ${hdrText}`}>
              <div>
                <h3 className="text-base font-black leading-none">{displayDay}</h3>
                <p className={`text-xs font-medium mt-0.5 ${hdrSub}`}>{fmtFull(date)}</p>
              </div>
              <span className={`text-sm font-black tracking-widest ${isYellow ? 'text-black' : isGreen ? 'text-white' : 'text-pink-500'}`}>
                SUNDAVÁNÍ
              </span>
            </div>
          </div>
          <div className="p-3 space-y-3">
            <div>
              <p className="text-xs font-bold text-gray-400 uppercase tracking-wide mb-1.5">Sundavači</p>
              <div className="flex flex-wrap gap-1.5">
                {REMOVAL_TEAM.filter(n => n !== 'Terezka').map(name => (
                  <button key={name} onClick={() => onToggleSundavac(name)}
                    className={`px-2.5 py-1 rounded-full text-xs font-semibold border transition-all
                      ${safeSundavaci.includes(name) ? activeBg + ' border-transparent' : 'bg-gray-50 text-gray-500 border-gray-200 hover:border-gray-300 hover:bg-gray-100'}`}>
                    {name}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <p className="text-xs font-bold text-gray-400 uppercase tracking-wide mb-1.5">Mytí chytů</p>
              <div className="flex flex-wrap gap-1.5">
                {['Korchy', 'Terezka', 'Kuba D.'].map(name => (
                  <button key={name} onClick={() => onToggleMyti(name)}
                    className={`px-2.5 py-1 rounded-full text-xs font-semibold border transition-all
                      ${myti === name ? 'bg-blue-600 text-white border-transparent' : 'bg-gray-50 text-gray-500 border-gray-200 hover:border-gray-300 hover:bg-gray-100'}`}>
                    {name}
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Logo components ──────────────────────────────────────────────────────
    const LanovkaLogo = ({ size = 52 }) => (

          className="flex-shrink-0">
          {/* Pink dash LEFT (at 75% letter height) */}

    // ── Slot component ───────────────────────────────────────────────────────
    function Slot({ num, name, sel, emptyBg, filledBg, filledText, numEmpty, selRing,
                    onClick, onDragStart, onDragOver, onDrop }) {
      return (
        <div onClick={onClick}
          draggable={!!name}
          onDragStart={name ? onDragStart : undefined}
          onDragOver={onDragOver}
          onDrop={onDrop}
          className={`flex items-center gap-2.5 px-3 py-2.5 rounded-xl border
            cursor-pointer transition-all duration-150 select-none
            ${name
              ? `${filledBg} ${filledText} hover:bg-red-50 hover:border-red-200 group`
              : `${emptyBg} border-dashed ${sel ? selRing : 'opacity-75'}`
            }`}>
          <span className={`w-5 h-5 rounded-full flex items-center justify-center
            text-xs font-bold flex-shrink-0
            ${name ? 'bg-white/70 text-gray-600' : numEmpty}`}>
            {num}
          </span>
          {name ? (
            <>
              <span className="flex-1 text-sm font-semibold truncate">{name}</span>
              <GripV c="w-4 h-4 opacity-20 group-hover:opacity-0 flex-shrink-0 transition-opacity" />
              <X c="w-3.5 h-3.5 opacity-0 group-hover:opacity-50 flex-shrink-0 transition-opacity" />
            </>
          ) : (
            <span className="text-xs text-gray-400 font-medium">
              {sel ? `Přiřadit: ${sel}` : 'Volný slot'}
            </span>
          )}
        </div>
      );
    }

    // ── SessionCard ──────────────────────────────────────────────────────────
    function SessionCard({ session, day, date, theme, slots, lanoSlot, calInfo,
      sel, onSlotClick, onDragStartSlot, onDragOverSlot, onDropSlot,
      onLanoClick, onDragStartLano, onDropLano, onClear, onDateChange,
      onShift, nextSector }) {

      const [editingDate, setEditingDate] = React.useState(false);
      const isYellow = theme === 'yellow';
      const isGreen  = theme === 'green';
      const rawDay = date.toLocaleString('cs-CZ', { weekday: 'long' });
      const displayDay = rawDay.charAt(0).toUpperCase() + rawDay.slice(1);
      // Defenzivní: data z Firestore mohou mít chybějící pole (např. týden má jen monday bez wednesday)
      const safeSlots = Array.isArray(slots) ? slots : [null, null, null, null];
      // Slot count: Tělocvična=2, Lanovka=variable, Limit=variable
      const maxSlots = calInfo?.sector && !calInfo.isOff
        ? (isGreen ? 2 : isYellow ? getLanovkaSlotCount(calInfo.sector) : getWedSlotCount(calInfo.sector))
        : safeSlots.length;
      const visibleSlots = safeSlots.slice(0, maxSlots);
      const filled = visibleSlots.filter(Boolean).length + (lanoSlot && calInfo != null ? 1 : 0);
      const total  = maxSlots + (lanoSlot !== undefined && calInfo != null ? 1 : 0);
      const allFilled = filled === total;
      const flash = false; // conflict prevention removed
      const isJulyAugust = date.getMonth() === 6 || date.getMonth() === 7;

      // Theme tokens
      const hdr      = isYellow ? 'bg-gradient-to-br from-amber-400 to-yellow-400' : isGreen ? 'bg-gradient-to-br from-emerald-500 to-green-600' : 'bg-[#1e1e20]';
      const hdrText  = isYellow ? 'text-gray-900' : 'text-white';
      const hdrSub   = isYellow ? 'text-gray-600' : isGreen ? 'text-white/60' : 'text-white/50';
      const progTrack= isYellow ? 'bg-black/15'   : 'bg-white/10';
      const progFill = isYellow ? 'bg-gray-700'   : isGreen ? 'bg-emerald-200' : 'bg-[#e6007e]';
      const countCol = allFilled ? (isYellow ? 'text-gray-900' : isGreen ? 'text-emerald-200' : 'text-[#e6007e]') : (isYellow ? 'text-gray-600' : 'text-white/60');

      const emptyBg  = isYellow
        ? 'border-amber-200 hover:border-amber-400 hover:bg-amber-50'
        : isGreen
        ? 'border-emerald-200 hover:border-emerald-400 hover:bg-emerald-50'
        : 'border-zinc-200 hover:border-pink-400 hover:bg-zinc-50';
      const filledBg  = isYellow ? 'bg-amber-50 border-amber-200'   : isGreen ? 'bg-emerald-50 border-emerald-200' : 'bg-zinc-50 border-zinc-200';
      const filledText= isYellow ? 'text-gray-900' : 'text-zinc-800';
      const numEmpty  = isYellow ? 'bg-amber-100 text-amber-600'    : isGreen ? 'bg-emerald-100 text-emerald-600' : 'bg-zinc-100 text-zinc-400';
      const selRing   = isYellow ? 'ring-2 ring-amber-400 ring-offset-1' : isGreen ? 'ring-2 ring-emerald-400 ring-offset-1' : 'ring-2 ring-pink-400 ring-offset-1';

      const slotProps = { sel, emptyBg, filledBg, filledText, numEmpty, selRing,
        onDragOver: onDragOverSlot };

      return (
        <div className={`bg-white rounded-2xl overflow-hidden shadow-sm border transition-all duration-300
          ${flash ? 'ring-2 ring-red-400 ring-offset-2 border-red-200' : 'border-gray-200'}`}>

          {/* Header */}
          <div className={`${hdr} p-4 h-52 flex flex-col justify-between`}>
            <div className={`flex items-center justify-between gap-3 ${hdrText}`}>
              <div className="flex-1 min-w-0">
                <h3 className="text-xl font-black leading-none">{displayDay}</h3>
                <div className="flex items-center gap-1 mt-0.5">
                  {editingDate ? (
                    <input type="date"
                      key={`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`}
                      defaultValue={`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`}
                      className={`text-xs font-medium outline-none rounded px-1 py-0.5 w-32
                        ${isYellow ? 'bg-black/10 text-gray-900' : 'bg-white/10 text-white'}`}
                      onChange={e => { if(e.target.value) onDateChange(e.target.value); }}
                      onBlur={e => { if(e.target.value) onDateChange(e.target.value); setEditingDate(false); }}
                      autoFocus
                    />
                  ) : (
                    <>
                      <p className={`text-sm font-medium ${hdrSub}`}>{fmtFull(date)}</p>
                      <button onClick={() => setEditingDate(true)} title="Změnit datum"
                        className={`p-0.5 rounded transition-opacity opacity-30 hover:opacity-80`}>
                        <CalEdit c="w-3 h-3" />
                      </button>
                    </>
                  )}
                </div>
                {calInfo?.sector && (
                  <span className={`inline-block mt-1.5 text-xs font-bold px-2 py-0.5 rounded-full
                    ${isYellow ? 'bg-black/10 text-gray-800' : 'bg-white/10 text-white/80'}`}>
                    {calInfo.sector}
                    {calInfo.note && <span className="ml-1 opacity-60">· {calInfo.note}</span>}
                  </span>
                )}
                {calInfo?.isOff && (
                  <span className={`inline-block mt-1.5 text-xs font-bold px-2 py-0.5 rounded-full
                    ${isYellow ? 'bg-black/10 text-gray-700' : 'bg-white/10 text-white/60'}`}>
                    {calInfo.sector}
                  </span>
                )}
                {!calInfo && isJulyAugust && (
                  <span className={`inline-block mt-1.5 text-xs font-bold px-2 py-0.5 rounded-full
                    ${isYellow ? 'bg-black/10 text-gray-700' : 'bg-white/10 text-white/60'}`}>
                    není stavění
                  </span>
                )}
              </div>
              <div className="flex-shrink-0">
                <span className={`text-sm font-black tracking-widest flex-shrink-0
                  ${isYellow ? 'text-black' : isGreen ? 'text-white' : 'text-pink-500'}`}>
                  {isYellow ? 'LANOVKA' : isGreen ? 'TĚLOCVIČNA' : 'LIMIT'}
                </span>
              </div>
              <button onClick={onClear} title="Vymazat přiřazení"
                className={`p-1.5 rounded-lg transition-colors flex-shrink-0
                  ${isYellow ? 'hover:bg-black/10' : 'hover:bg-white/20'}`}>
                <RotateCcw c="w-3.5 h-3.5" />
              </button>
            </div>

            {/* Sector label — výška sjednocena s Limit sektor gridem */}
            {calInfo?.sector && !calInfo.isOff && isYellow && (
              <div className="mt-3 rounded-lg px-3 py-2.5 flex items-center justify-center bg-black/10 ring-1 ring-black/10">
                <span className={`font-black text-center leading-tight tracking-tight break-words w-full text-amber-900
                  ${calInfo.sector.length > 20 ? 'text-sm' : calInfo.sector.length > 12 ? 'text-base' : 'text-lg'}`}>
                  {calInfo.sector}
                </span>
              </div>
            )}
            {/* Není stavění — July/August alternating weeks */}
            {calInfo == null && isJulyAugust && (
              <div className={`mt-3 rounded-xl px-3 py-4 flex items-center justify-center min-h-[3.5rem]
                ${isYellow ? 'bg-black/10 ring-1 ring-black/10' : 'bg-white/5 ring-1 ring-white/10'}`}>
                <span className={`text-sm font-bold ${isYellow ? 'text-amber-800/50' : 'text-white/30'}`}>
                  není stavění
                </span>
              </div>
            )}
            {/* Limit sequence: Dětská → Přední převis → Zadní převis → Kolmice */}
            {calInfo?.sector && !calInfo.isOff && !isYellow && !isGreen && (() => {
              const active = getLimitSectors(calInfo.sector);
              const steps = [
                { id: 1, label: 'Dětská' },
                { id: 2, label: 'Přední převis' },
                { id: 3, label: 'Zadní převis' },
                { id: 4, label: 'Kolmice' },
              ];
              return (
                <div className="mt-3 grid grid-cols-4 gap-1.5">
                  {steps.map(({ id, label }) => (
                    <div key={id} className={`rounded-lg py-2.5 px-1 text-center
                      ${active.has(id) ? 'bg-pink-600 ring-1 ring-pink-400' : 'bg-white/5 ring-1 ring-white/10'}`}>
                      <div className={`text-xs font-black leading-tight
                        ${active.has(id) ? 'text-white' : 'text-white/30'}`}>
                        {label}
                      </div>
                    </div>
                  ))}
                </div>
              );
            })()}

            {/* Progress */}
            <div className="mt-3 flex items-center gap-2.5">
              <div className={`flex-1 ${progTrack} rounded-full h-1.5`}>
                <div className={`${progFill} rounded-full h-1.5 transition-all duration-500`}
                  style={{ width: `${(filled / total) * 100}%` }} />
              </div>
              <span className={`text-xs font-bold tabular-nums ${countCol}`}>
                {allFilled && '✓ '}{filled}/{total}
              </span>
            </div>
          </div>

          {/* Main slots */}
          <div className="p-3 space-y-2">
            {calInfo?.isOff ? (
              <div className={`text-center py-4 text-sm font-medium rounded-xl
                ${isYellow ? 'text-amber-600 bg-amber-50' : isGreen ? 'text-emerald-600 bg-emerald-50' : 'text-zinc-400 bg-zinc-50'}`}>
                {calInfo.sector === 'Sundavání' ? '🧹 ' : '🚐 '}
                {calInfo.sector} — není stavění
              </div>
            ) : calInfo == null ? (
              <div className={`text-center py-2 text-xs font-medium rounded-xl
                ${isYellow ? 'text-amber-400/60 bg-amber-50/50' : 'text-white/20 bg-white/5'}`}>
                —
              </div>
            ) : (
              visibleSlots.map((name, i) => (
                <Slot key={i} num={i+1} name={name} {...slotProps}
                  onClick={() => onSlotClick(i)}
                  onDragStart={() => onDragStartSlot(i, name)}
                  onDrop={() => onDropSlot(i)} />
              ))
            )}

            {/* Lano section (Lanovka only) */}
            {lanoSlot !== undefined && calInfo != null && !calInfo?.isOff && (
              <div className="mt-3 pt-3 border-t border-amber-100">
                <p className="text-xs font-bold text-amber-700 mb-2 flex items-center gap-1">
                  Lano
                </p>
                <Slot num="L" name={lanoSlot} {...slotProps}
                  emptyBg="border-amber-300 hover:border-amber-500 hover:bg-amber-50"
                  numEmpty="bg-amber-200 text-amber-700"
                  onClick={onLanoClick}
                  onDragStart={() => onDragStartLano && onDragStartLano(lanoSlot)}
                  onDrop={onDropLano} />
              </div>
            )}

            {/* Conflict flash */}
            {flash && (
              <div className="flex items-center gap-2 text-xs font-semibold text-red-600
                bg-red-50 border border-red-100 rounded-xl px-3 py-2 mt-1">
                <AlertCircle c="w-3.5 h-3.5 flex-shrink-0" />
                Stavěč je již přiřazen v tomto týdnu!
              </div>
            )}

          </div>
        </div>
      );
    }

    // ── ClimberChip ──────────────────────────────────────────────────────────
    function ClimberChip({ name, isSelected, inMon, inWed, isHost, onClick, onRemove, onDragStart }) {
      return (
        <div draggable onDragStart={onDragStart} onClick={onClick}
          className={`group flex items-center gap-1.5 pl-2.5 pr-1.5 py-1.5 rounded-full border
            text-sm cursor-pointer transition-all duration-150 select-none
            ${isSelected
              ? 'bg-gray-900 border-gray-800 text-white shadow-md scale-[1.03]'
              : isHost
                ? 'bg-pink-50 border-pink-200 text-pink-800 hover:border-pink-300 hover:shadow-sm'
                : 'bg-white border-gray-200 text-gray-700 hover:border-gray-300 hover:shadow-sm'
            }`}>
          <UserIcon c="w-5 h-5 flex-shrink-0 opacity-50" />
          <span className={`font-semibold ${isHost ? 'italic' : ''}`}>{name}</span>
          {isHost && (
            <span className={`text-[10px] px-1.5 py-0.5 rounded-full font-black uppercase tracking-wider
              ${isSelected ? 'bg-pink-400/30 text-white' : 'bg-pink-200 text-pink-700'}`}>Host</span>
          )}
          {inMon && (
            <span className={`text-xs px-1.5 py-0.5 rounded-full font-bold
              ${isSelected ? 'bg-white/20 text-white' : 'bg-amber-100 text-amber-700'}`}>Po</span>
          )}
          {inWed && (
            <span className={`text-xs px-1.5 py-0.5 rounded-full font-bold
              ${isSelected ? 'bg-white/20 text-white' : 'bg-pink-100 text-pink-700'}`}>St</span>
          )}
          <button onClick={e => { e.stopPropagation(); onRemove(); }}
            className={`ml-0.5 p-0.5 rounded-full transition-colors flex-shrink-0
              ${isSelected
                ? 'text-white/50 hover:text-white hover:bg-white/20'
                : 'text-gray-300 hover:text-red-400 hover:bg-red-50'}`}>
            <X c="w-3 h-3" />
          </button>
        </div>
      );
    }

    // ── Lanovka floor plan ───────────────────────────────────────────────
    // Maps CAL sector text → set of highlighted sector numbers (1–5)
    function getLanovkaSectors(sectorName) {
      if (!sectorName) return new Set();
      const s = sectorName.toLowerCase();
      const out = new Set();
      if (s.includes('hříbek') || s.includes('hribek'))             out.add(4);
      if (s.includes('kout')   || s.includes('strop'))              out.add(2);
      if (s.includes('nový')   || s.includes('nahoře') ||
          s.includes('šedá')   || s.includes('profil'))             out.add(3);
      if (s.includes('dole') &&
          (s.includes('kolm')  || s.includes('přev') ||
           s.includes('prev')  || s.includes('malé')))              out.add(5);
      if (!out.has(5) &&
          (s.includes('přev')  || s.includes('prev') ||
           s.includes('bizár') || s.includes('bizar')))             out.add(1);
      return out;
    }

    function LanovkaFloorPlan({ activeSectors }) {
      const as = activeSectors || new Set();
      const aF = '#fbbf24', iF = '#2a2a2c';
      const aS = '#f59e0b', iS = '#484848';
      const aL = '#78350f', iL = '#555';
      const f  = n => as.has(n) ? aF : iF;
      const st = n => as.has(n) ? aS : iS;
      const lb = n => as.has(n) ? aL : iL;

      return (
        <svg viewBox="0 0 300 224" xmlns="http://www.w3.org/2000/svg" className="w-full">
          <rect width="300" height="224" fill="#111113" rx="8"/>

          {/* ══ HORNÍ PATRO — sektory 1, 3, 4 ══ */}
          <text x="12" y="14" fontSize="5" fontWeight="700" fontFamily="Arial,sans-serif"
            fill="#444" letterSpacing="1">NAHOŘE</text>

          {/* 1. Převis + Bizár — jeden spojený schodový tvar */}
          <polygon points="9,34 137,34 137,20 201,20 201,52 9,52"
            fill={f(1)} stroke={st(1)} strokeWidth="1.5"/>
          <text x="70" y="45" textAnchor="middle" fontSize="8" fontWeight="900"
            fontFamily="Arial Black,sans-serif" fill={lb(1)}>1</text>
          <text x="70" y="55" textAnchor="middle" fontSize="4.5" fontWeight="600"
            fontFamily="Arial,sans-serif" fill={lb(1)} opacity="0.85">Převis / Bizár</text>

          {/* 3. Nový profil — jeden polygon (zkosený blok + spodní proužek spojeny) */}
          <polygon points="212,9 291,9 291,108 274,108 274,78 260,64 212,40"
            fill={f(3)} stroke={st(3)} strokeWidth="1.5"/>
          <text x="263" y="34" textAnchor="middle" fontSize="8" fontWeight="900"
            fontFamily="Arial Black,sans-serif" fill={lb(3)}>3</text>
          <text x="263" y="44" textAnchor="middle" fontSize="4.5" fontWeight="600"
            fontFamily="Arial,sans-serif" fill={lb(3)} opacity="0.85">Nový profil</text>
          <text x="282" y="100" textAnchor="middle" fontSize="5.5" fontWeight="900"
            fontFamily="Arial Black,sans-serif" fill={lb(3)}>3</text>

          {/* 3. Šedá kolmice — chybějící část sektoru 3, úzký vertikální proužek */}
          <rect x="193" y="56" width="18" height="52" rx="1"
            fill={f(3)} stroke={st(3)} strokeWidth="1.5"/>
          <text x="202" y="82" textAnchor="middle" fontSize="5.5" fontWeight="900"
            fontFamily="Arial Black,sans-serif" fill={lb(3)}>3</text>
          <text x="202" y="91" textAnchor="middle" fontSize="3.5" fontWeight="600"
            fontFamily="Arial,sans-serif" fill={lb(3)} opacity="0.85">Šedá</text>
          <text x="202" y="99" textAnchor="middle" fontSize="3.5" fontWeight="600"
            fontFamily="Arial,sans-serif" fill={lb(3)} opacity="0.85">kolmice</text>

          {/* 4. Hříbek — přesný kosočtverec, nezasahuje do jiných profilů */}
          <polygon points="115,56 190,82 115,108 40,82"
            fill={f(4)} stroke={st(4)} strokeWidth="1.5"/>
          <text x="115" y="78" textAnchor="middle" fontSize="9" fontWeight="900"
            fontFamily="Arial Black,sans-serif" fill={lb(4)}>4</text>
          <text x="115" y="89" textAnchor="middle" fontSize="5" fontWeight="600"
            fontFamily="Arial,sans-serif" fill={lb(4)} opacity="0.85">Hříbek</text>

          {/* ══ DOLNÍ PATRO — sektory 2 vlevo, 5 vpravo, uprostřed místo ══ */}
          <text x="12" y="122" fontSize="5" fontWeight="700" fontFamily="Arial,sans-serif"
            fill="#444" letterSpacing="1">DOLE</text>

          {/* 2. Kout / Strop — levá strana */}
          <rect x="9" y="126" width="80" height="88" rx="1"
            fill={f(2)} stroke={st(2)} strokeWidth="1.5"/>
          <text x="49" y="168" textAnchor="middle" fontSize="9" fontWeight="900"
            fontFamily="Arial Black,sans-serif" fill={lb(2)}>2</text>
          <text x="49" y="179" textAnchor="middle" fontSize="4.5" fontWeight="600"
            fontFamily="Arial,sans-serif" fill={lb(2)} opacity="0.85">Kout / Strop</text>

          {/* 5. Dole kolmice — vertikální proužek vpravo, uprostřed místo */}
          <rect x="205" y="126" width="52" height="88" rx="1"
            fill={f(5)} stroke={st(5)} strokeWidth="1.5"/>
          <text x="231" y="168" textAnchor="middle" fontSize="9" fontWeight="900"
            fontFamily="Arial Black,sans-serif" fill={lb(5)}>5</text>
          <text x="231" y="179" textAnchor="middle" fontSize="4.5" fontWeight="600"
            fontFamily="Arial,sans-serif" fill={lb(5)} opacity="0.85">Kolmice / Převis</text>
        </svg>
      );
    }


    // ── Limit floor plan ─────────────────────────────────────────────────
    // Sectors per the PDF plan:
    //  1 = Dětská (left, 4 setters)   2 = Přední převis (center-lower, 3 setters)
    //  3 = Zadní převis (center-upper, 3 setters)   4 = Kolmice (right, 4 setters)
    function getLimitSectors(sectorName) {
      if (!sectorName) return new Set();
      const s = sectorName.toLowerCase();
      const out = new Set();
      if (s.includes('dět') || s.includes('det'))   out.add(1);
      if (s.includes('přev') || s.includes('prev')) {
        const isZadni  = s.includes('zadní') || s.includes('zadni');
        const isPredni = s.includes('přední') || s.includes('predni');
        if (isZadni && !isPredni)       out.add(3);          // Zadní převis only
        else if (isPredni && !isZadni)  out.add(2);          // Přední převis only
        else                            { out.add(2); out.add(3); } // generic → both
      }
      if (s.includes('kolm'))                        out.add(4);
      return out;
    }
    function getWedSlotCount(sectorName) {
      if (!sectorName) return 4;
      const s = sectorName.toLowerCase();
      if (s.includes('zadní') || s.includes('zadni')) return 4; // Zadní převis: 4 stavěči
      if (s.includes('přev') || s.includes('prev')) return 3;   // Přední převis: 3 stavěči
      return 4; // Dětská a Kolmice: 4 stavěči
    }
    function getLanovkaSlotCount(sector) {
      if (!sector) return 4;
      const s = sector.toLowerCase();
      if (s.includes('hříbek') || s.includes('hribek')) return 4;
      if (s.includes('převis') && s.includes('biz'))    return 3;
      if (s.includes('nový')   || s.includes('novy'))   return 3;
      return 2; // Dole kout+Strop, Dole kolmice+převis
    }

    function LimitFloorPlan({ activeSectors }) {
      const as = activeSectors || new Set();
      const aF = '#e6007e', iF = '#2c2c2e';
      const aS = '#ff4db5', iS = '#3a3a3c';
      const aL = '#fff',    iL = '#666';
      const f  = n => as.has(n) ? aF : iF;
      const st = n => as.has(n) ? aS : iS;
      const lb = n => as.has(n) ? aL : iL;
      // 3 equal columns (each 84px), 13px gaps, 6px margin → viewBox 300
      const cw = 84, g = 13, m = 6;
      const x1 = m, x2 = m + cw + g, x3 = m + 2*(cw + g);
      const cx1 = x1 + cw/2, cx2 = x2 + cw/2, cx3 = x3 + cw/2;
      return (
        <svg viewBox="0 0 300 185" xmlns="http://www.w3.org/2000/svg" className="w-full">
          <rect width="300" height="185" fill="#111113" rx="8"/>

          {/* 1. Dětská */}
          <polygon points={`${x1+5},6 ${x1+cw-5},6 ${x1+cw},179 ${x1},179`}
            fill={f(1)} stroke={st(1)} strokeWidth="1.5"/>
          <text x={cx1} y="86" textAnchor="middle" fontSize="13" fontWeight="900"

    // ── YearPlan ─────────────────────────────────────────────────────────
    function YearPlan() {
      const MONTHS_CS = ['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
      const lanovkaKey = [
        { n:'L1', label:'Převis + Bizár',               slots:3 },
        { n:'L2', label:'Dole kout + Strop',            slots:2 },
        { n:'L3', label:'Nový profil + nahoře kolmice', slots:3 },
        { n:'L4', label:'Hříbek',                       slots:4 },
        { n:'L5', label:'Dole kolmice + převis',        slots:2 },
      ];
      const limitKey = [
        { label:'Dětská',        day:'čtvrtek' },
        { label:'Přední převis', day:'středa'  },
        { label:'Zadní převis',  day:'středa'  },
        { label:'Kolmice',       day:'středa'  },
        { label:'Volno',         day:'—'       },
      ];

      // Dostupné roky jsou roky, pro které existují CAL entries
      const availableYears = Array.from(new Set(
        Object.keys(CAL).map(k => Number(k.slice(0, 4)))
      )).sort();
      const [year, setYear] = useState(() => {
        const nowYear = new Date().getFullYear();
        return availableYears.includes(nowYear) ? nowYear : availableYears[0];
      });

      // Build monthly data from CAL
      const monthly = Array.from({length:12}, () => ({ lanovka:[], limit:[], gym:0 }));
      Object.entries(CAL).sort().forEach(([key, entry]) => {
        const mon = new Date(key + 'T12:00:00'); // T12:00:00 aby se ISO date neparsoval jako UTC (timezone shift)
        if (mon.getFullYear() !== year) return;
        const dayName = d => d.toLocaleString('cs-CZ', { weekday: 'long' });
        if (entry.mon && !entry.mon.isOff && entry.mon.sector) {
          const lanD = addDays(mon, lanovkaOffset(mon));
          monthly[lanD.getMonth()].lanovka.push({ day: lanD.getDate(), dayName: dayName(lanD), sector: entry.mon.sector });
        }
        if (entry.wed && !entry.wed.isOff && entry.wed.sector) {
          const wOff = limitOffset(mon, entry.wed.sector);
          const wedD = addDays(mon, wOff);
          monthly[wedD.getMonth()].limit.push({ day: wedD.getDate(), dayName: dayName(wedD), sector: entry.wed.sector });
        }
        if (entry.thu) {
          const thuD = new Date(mon); thuD.setDate(thuD.getDate() + 3);
          monthly[thuD.getMonth()].gym += 1;
        }
      });

      return (
        <div className="mt-2 space-y-5">
          {/* Year selector */}
          {availableYears.length > 1 && (
            <div className="flex items-center justify-center gap-2">
              {availableYears.map(y => (
                <button key={y} onClick={() => setYear(y)}
                  className={`px-4 py-1.5 rounded-full text-sm font-black tabular-nums transition-colors
                    ${year === y
                      ? 'bg-gray-900 text-white'
                      : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>
                  {y}
                </button>
              ))}
            </div>
          )}

          {/* Rotation keys */}
          <div className="grid grid-cols-2 gap-4">
            {/* Lanovka */}
            <div className="bg-amber-50 rounded-2xl p-4 space-y-3">
              <div>
                <p className="text-xs font-black text-amber-800 uppercase tracking-wider">Lanovka — rotace</p>
                <p className="text-xs text-amber-600 mt-1">Leden–červen + září–prosinec: každý týden v pondělí. Červenec–srpen: střídá se s Limitem.</p>
              </div>
              {lanovkaKey.map(r => (
                <div key={r.n} className="flex items-center gap-2 py-1.5 border-b border-amber-100 last:border-0">
                  <span className="text-xs font-black text-amber-500 w-6">{r.n}</span>
                  <span className="text-sm text-amber-900 flex-1">{r.label}</span>
                  <span className="text-xs font-semibold text-amber-600">{r.slots} st.</span>
                </div>
              ))}
            </div>
            {/* Limit */}
            <div className="bg-zinc-900 rounded-2xl p-4 space-y-3">
              <div>
                <p className="text-xs font-black text-pink-400 uppercase tracking-wider">Limit — rotace</p>
                <p className="text-xs text-white/40 mt-1">Od dubna 2026. Středa (Dětská výjimečně čtvrtek). Červenec–srpen: střídá se s Lanovkou.</p>
              </div>
              {limitKey.map((r,i) => (
                <div key={i} className="flex items-center gap-2 py-1.5 border-b border-white/10 last:border-0">
                  <span className="text-xs font-black text-pink-500 w-4">{i+1}.</span>
                  <span className="text-sm text-white flex-1">{r.label}</span>
                  <span className="text-xs text-white/30">{r.day}</span>

              ))}

          </div>

          {/* Three separate wall calendars side by side */}
          <div className="overflow-x-auto">
          <div className="grid grid-cols-3 gap-4 min-w-[30rem]">

            {/* LANOVKA */}
            <div className="rounded-2xl overflow-hidden border border-amber-200">
              <div className="bg-gradient-to-br from-amber-400 to-yellow-400 px-4 py-3">
                <p className="text-sm font-black text-gray-900 uppercase tracking-wider">Lanovka</p>
                <p className="text-xs text-amber-800/70 mt-0.5">pondělí</p>
              </div>
              {MONTHS_CS.map((name, m) => {
                const d = monthly[m];
                if (d.lanovka.length === 0 && d.gym === 0) return (
                  <div key={m} className="px-3 py-2 border-b border-amber-50 last:border-0">
                    <span className="text-[10px] font-black text-amber-300 uppercase">{name}</span>
                    <span className="text-[11px] text-gray-200 ml-2">—</span>
                  </div>
                );
                return (
                  <div key={m} className="px-3 py-2.5 border-b border-amber-100 last:border-0 bg-amber-50/40">
                    <p className="text-[10px] font-black text-amber-500 uppercase tracking-wide mb-1">{name}</p>
                    {d.lanovka.map((s,i) => (
                      <div key={i} className="mb-0.5">
                        <span className="text-[10px] text-amber-400 font-bold">{s.day}. {s.dayName} </span>
                        <span className="text-[11px] font-semibold text-amber-900">{s.sector}</span>

                    ))}
                    {d.gym > 0 && <div className="text-[10px] font-bold text-emerald-600 mt-0.5">Tělocvična ×{d.gym}</div>}

              </div>
              {MONTHS_CS.map((name, m) => {
                const d = monthly[m];
                if (d.limit.length === 0) return (
                  <div key={m} className="px-3 py-2 border-b border-zinc-800 last:border-0 bg-zinc-900">
                    <span className="text-[10px] font-black text-zinc-600 uppercase">{name}</span>
                    <span className="text-[11px] text-zinc-700 ml-2">—</span>
                  </div>
                );
                return (
                  <div key={m} className="px-3 py-2.5 border-b border-zinc-800 last:border-0 bg-zinc-900">
                    <p className="text-[10px] font-black text-pink-500 uppercase tracking-wide mb-1">{name}</p>
                    {d.limit.map((s,i) => (
                      <div key={i} className="mb-0.5">
                        <span className="text-[10px] text-pink-400 font-bold">{s.day}. {s.dayName} </span>
                        <span className="text-[11px] font-semibold text-pink-100">{s.sector}</span>
                      </div>

                );

            </div>

            {/* TĚLOCVIČNA */}
            <div className="rounded-2xl overflow-hidden border border-emerald-200">
              <div className="bg-gradient-to-br from-emerald-500 to-green-600 px-4 py-3">
                <p className="text-sm font-black text-white uppercase tracking-wider">Tělocvična</p>
                <p className="text-xs text-white/60 mt-0.5">čtvrtek · každé 4 týdny</p>
              </div>
              {MONTHS_CS.map((name, m) => {
                const d = monthly[m];
                return (
                  <div key={m} className={`px-3 py-2.5 border-b border-emerald-100 last:border-0 ${d.gym > 0 ? 'bg-emerald-50/60' : ''}`}>
                    <span className="text-[10px] font-black text-emerald-500 uppercase tracking-wide">{name}</span>
                    {d.gym > 0
                      ? <span className="text-[11px] font-bold text-emerald-800 ml-2">×{d.gym}</span>
                      : <span className="text-[11px] text-gray-200 ml-2">—</span>}
                  </div>
                );
              })}
            </div>

          </div>
          </div>{/* end overflow-x-auto */}
        </div>
      );
    }

    // ── MonthlyOccupancy ─────────────────────────────────────────────────
    function MonthlyOccupancy({ data, viewMonday }) {
      // Zobrazené 3 měsíce vychází z týdne, na který se uživatel právě dívá
      const base = viewMonday instanceof Date ? viewMonday : new Date();
      const months = [0, 1, 2].map(offset => {
        const d = new Date(base.getFullYear(), base.getMonth() + offset, 1);
        return { year: d.getFullYear(), month: d.getMonth() }; // 0-indexed
      });

      return (
        <div className="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
          <div className="px-4 pt-4 pb-2 border-b border-gray-100">
            <h2 className="font-bold text-gray-900 text-sm">Obsazenost</h2>
          </div>
          <div className="p-3 space-y-3">
            {months.map(({ year, month }) => {
              // Compute occupancy for this month
              let monSetterFill = 0, monSetterTotal = 0;
              let monLanoFill  = 0, monLanoTotal  = 0;
              let wedFill = 0, wedTotal = 0;
              let thuFill = 0, thuTotal = 0;

              Object.keys(CAL).forEach(k => {
                const [ky, km, kd] = k.split('-').map(Number);
                const monDate = new Date(ky, km - 1, kd);
                const calEntry = CAL[k];
                const wd = data[k] ?? { monday: [], mondayLano: null, wednesday: [], thursday: [] };
                // Respect sector overrides (shifted/cancelled weeks count as isOff)
                const effMon = wd.monSectorOverride ?? calEntry?.mon ?? null;
                const effWed = wd.wedSectorOverride ?? calEntry?.wed ?? null;
                const wOff = limitOffset(monDate, effWed?.sector);
                const lOff = lanovkaOffset(monDate);

                // Lanovka — pondělí (do srpna 2026) / úterý (od září 2026)
                if (effMon && !effMon.isOff) {
                  const sessionDate = addDays(monDate, lOff);
                  if (sessionDate.getFullYear() === year && sessionDate.getMonth() === month) {
                    const maxSlots = getLanovkaSlotCount(effMon.sector);
                    monSetterTotal += maxSlots;
                    monSetterFill  += (wd.monday || []).slice(0, maxSlots).filter(Boolean).length;
                    monLanoTotal   += 1;
                    monLanoFill    += wd.mondayLano ? 1 : 0;
                  }
                }
                // Limit — Wed (+2) or Thu (+3 for Dětská)
                if (effWed && !effWed.isOff && effWed.sector !== 'Volno') {
                  const sessionDate = addDays(monDate, wOff);
                  if (sessionDate.getFullYear() === year && sessionDate.getMonth() === month) {
                    const maxSlots = getWedSlotCount(effWed.sector);
                    wedTotal += maxSlots;
                    wedFill += (wd.wednesday || []).slice(0, maxSlots).filter(Boolean).length;
                  }
                }
                // Tělocvična — Thursday (+3)
                if (calEntry?.thu && !calEntry.thu.isOff) {
                  const sessionDate = addDays(monDate, 3);
                  if (sessionDate.getFullYear() === year && sessionDate.getMonth() === month) {
                    thuTotal += 2;
                    thuFill += (wd.thursday || []).slice(0, 2).filter(Boolean).length;
                  }
                }
              });

              const pct = (f, t) => t ? Math.round(f / t * 100) : null;
              const monSetterPct = pct(monSetterFill, monSetterTotal);
              const monLanoPct   = pct(monLanoFill,   monLanoTotal);
              const wedPct = pct(wedFill, wedTotal);
              const thuPct = pct(thuFill, thuTotal);
              const monthLabel = new Date(year, month, 1).toLocaleString('cs-CZ', { month: 'long' });

              const Bar = ({ pct, color }) => pct === null ? null : (
                <div className="flex items-center gap-1.5">
                  <div className="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden">
                    <div className={`h-full rounded-full ${color}`} style={{ width: `${pct}%` }} />
                  </div>
                  <span className="text-sm font-bold tabular-nums w-9 text-right text-gray-600">{pct}%</span>
                </div>
              );

              return (
                <div key={`${year}-${month}`} className="rounded-xl border border-gray-100 bg-gray-50 px-3 py-3">
                  <p className="text-sm font-black text-gray-800 mb-2 capitalize">{monthLabel} {year}</p>
                  {monSetterPct !== null && (
                    <div className="flex items-center gap-2 mb-1.5">
                      <span className="text-sm text-amber-500 font-semibold w-24 shrink-0">Lanovka</span>
                      <Bar pct={monSetterPct} color="bg-amber-400" />
                    </div>
                  )}
                  {monLanoPct !== null && (
                    <div className="flex items-center gap-2 mb-1.5">
                      <span className="text-sm text-amber-500 font-semibold w-24 shrink-0">Lano</span>
                      <Bar pct={monLanoPct} color="bg-amber-600" />
                    </div>
                  )}
                  {wedPct !== null && (
                    <div className="flex items-center gap-2 mb-1.5">
                      <span className="text-sm text-pink-500 font-semibold w-24 shrink-0">Limit</span>
                      <Bar pct={wedPct} color="bg-pink-500" />
                    </div>
                  )}
                  {thuPct !== null && (
                    <div className="flex items-center gap-2">
                      <span className="text-sm text-emerald-700 font-semibold w-24 shrink-0">Tělocvična</span>
                      <Bar pct={thuPct} color="bg-emerald-500" />
                    </div>
                  )}
                  {monSetterPct === null && wedPct === null && thuPct === null && (
                    <p className="text-sm text-gray-400">Žádné stavění</p>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── RacesPanel — obsazenost slotů závodů a dostavby ──────────────────────
    function RacesPanel({ races }) {
      const fmtShort = iso => {
        const d = new Date(iso + 'T12:00:00');
        return `${d.getDate()}.${d.getMonth()+1}.`;
      };
      const today = new Date(); today.setHours(0,0,0,0);
      // Závod se v panelu objeví až 3 měsíce před svým datem (vzdálenější budoucí závody skryté)
      const cutoff = new Date(today); cutoff.setMonth(cutoff.getMonth() + 3);
      // Zploštíme závod + jeho dostavba dny do jednoho seznamu rovnocenných položek
      const items = [];
      Object.values(races || {}).forEach(race => {
        if (!race?.date) return;
        const rd = new Date(race.date + 'T12:00:00');
        if (rd > cutoff) return; // závod je dál než 3 měsíce v budoucnu — zatím nezobrazovat
        items.push({ kind: 'race', race, date: race.date });
        (race.dostavba || []).forEach((day, idx) => {
          if (day?.date) items.push({ kind: 'dostavba', race, day, idx, date: day.date });
        });
      });
      items.sort((a, b) => a.date.localeCompare(b.date) || (a.kind === 'race' ? -1 : 1));
      if (items.length === 0) return null;
      return (
        <div className="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
          <div className="px-4 pt-4 pb-2 border-b border-gray-100">
            <h2 className="font-bold text-gray-900 text-sm">Závody</h2>
          </div>
          <div className="p-3 space-y-2.5">
            {items.map((it, i) => {
              const isRace = it.kind === 'race';
              const total  = isRace ? (it.race.slotCount || 0) : (it.day.slotCount || 0);
              const setters = isRace ? it.race.setters : it.day.setters;
              const filled = (setters || []).slice(0, total).filter(Boolean).length;
              const pct    = total ? Math.round(filled / total * 100) : 0;
              const allFilled = total > 0 && filled === total;
              const itemDate = new Date(it.date + 'T12:00:00');
              const isPast = itemDate < today;
              return (
                <div key={`${it.kind}-${it.date}-${i}`}
                  className={`rounded-xl border px-3 py-2.5 transition-opacity
                    ${isPast ? 'border-gray-100 bg-gray-50 opacity-60' : 'border-pink-200 bg-pink-50/40'}`}>
                  <div className="flex items-baseline justify-between gap-2 mb-1.5">
                    {isRace ? (
                      <p className={`text-sm font-black truncate
                        ${it.race.name ? 'text-pink-500 uppercase tracking-wide' : 'text-gray-500 italic'}`}>
                        {it.race.name || '(bez názvu)'}
                      </p>
                    ) : (
                      <p className="text-sm font-black truncate uppercase tracking-wide">
                        <span className="text-pink-500">Dostavba</span>
                        {it.race.name && (
                          <span className="text-gray-400 font-bold tracking-normal normal-case ml-1">· {it.race.name}</span>
                        )}
                      </p>
                    )}
                    <span className="text-xs font-semibold text-gray-500 tabular-nums shrink-0">{fmtShort(it.date)}</span>
                  </div>
                  <div className="flex items-center gap-2">
                    <div className="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden">
                      <div className={`h-full rounded-full transition-all duration-500 ${allFilled ? 'bg-pink-600' : 'bg-pink-400'}`}
                        style={{ width: `${pct}%` }} />
                    </div>
                    <span className={`text-sm font-bold tabular-nums w-10 text-right
                      ${allFilled ? 'text-pink-500' : 'text-gray-600'}`}>
                      {filled}/{total}
                    </span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── DatePickerCalendar (Limit brand) ─────────────────────────────────────
    function DatePickerCalendar({ value, onChange }) {
      const today = new Date(); today.setHours(0,0,0,0);
      const initial = value ? new Date(value + 'T12:00:00') : today;
      const [month, setMonth] = useState(new Date(initial.getFullYear(), initial.getMonth(), 1));
      const iso = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const firstWeekday = ((new Date(month).getDay() + 6) % 7); // Po=0, Ne=6
      const daysInMonth = new Date(month.getFullYear(), month.getMonth() + 1, 0).getDate();
      const cells = [];
      for (let i = 0; i < firstWeekday; i++) cells.push(null);
      for (let i = 1; i <= daysInMonth; i++) cells.push(new Date(month.getFullYear(), month.getMonth(), i));
      const monthLabel = month.toLocaleString('cs-CZ', { month: 'long', year: 'numeric' });
      const dayLabels = ['Po','Út','St','Čt','Pá','So','Ne'];
      return (
        <div className="bg-zinc-900 rounded-xl p-3 border border-zinc-800">
          <div className="flex items-center justify-between mb-3">
            <button onClick={() => setMonth(new Date(month.getFullYear(), month.getMonth()-1, 1))}
              className="p-1.5 rounded-lg hover:bg-zinc-800 text-zinc-400">
              <ChevronLeft c="w-4 h-4" />
            </button>
            <p className="text-sm font-black text-white capitalize tracking-wide">{monthLabel}</p>
            <button onClick={() => setMonth(new Date(month.getFullYear(), month.getMonth()+1, 1))}
              className="p-1.5 rounded-lg hover:bg-zinc-800 text-zinc-400">
              <ChevronRight c="w-4 h-4" />
            </button>
          </div>
          <div className="grid grid-cols-7 gap-1">
            {dayLabels.map(d => (
              <span key={d} className="text-center text-[10px] font-black text-zinc-500 uppercase tracking-widest pb-1">{d}</span>
            ))}
            {cells.map((d, i) => {
              if (!d) return <span key={i} />;
              const isToday    = d.getTime() === today.getTime();
              const isPast     = d < today;
              const isSelected = value === iso(d);
              return (
                <button key={i} onClick={() => !isPast && onChange(iso(d))} disabled={isPast}
                  className={`aspect-square rounded-lg text-sm font-bold transition-colors
                    ${isSelected ? 'bg-pink-600 text-white ring-2 ring-pink-400'
                      : isPast ? 'text-zinc-700 cursor-not-allowed'
                      : isToday ? 'bg-zinc-800 text-pink-400 hover:bg-zinc-700'
                      : 'text-zinc-300 hover:bg-zinc-800'}`}>
                  {d.getDate()}
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    // ── AddRaceModal (Limit brand) ───────────────────────────────────────────

      const [sectors,        setSectors]       = useState([]);
      const [slotCount,      setSlotCount]     = useState(4);

      const [dostavbaDays,   setDostavbaDays]  = useState([]);
      const valid = date && sectors.length > 0 && slotCount > 0
        && dostavbaDays.every(d => d.sectors.length > 0 && d.slotCount > 0);
      const dateConflict = date && existingRaceDates.has(date);
      const toggleSector = s => setSectors(curr => curr.includes(s) ? curr.filter(x => x !== s) : [...curr, s]);
      const isoDate = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

      // Když se mění datum nebo počet dostavby — pře-vygeneruj dostavba dny s defaulty
      // (datum = race + 2 + i; profily a počet stavěčů zachová z předchozího stavu)
      React.useEffect(() => {
        if (!date || dostavbaCount === 0) {
          if (dostavbaDays.length !== 0) setDostavbaDays([]);
          return;
        }
        setDostavbaDays(prev => {
          const out = [];
          for (let i = 0; i < dostavbaCount; i++) {
            const def = addDays(new Date(date + 'T12:00:00'), 2 + i);
            out.push({
              date: prev[i]?.date ?? isoDate(def),
              sectors: prev[i]?.sectors ?? [...sectors],
              slotCount: prev[i]?.slotCount ?? 4,
            });
          }
          return out;
        });
      }, [date, dostavbaCount]);

      const shiftDostavbaDay = (idx, delta) => {
        setDostavbaDays(prev => prev.map((d, i) => {
          if (i !== idx) return d;
          const newDate = addDays(new Date(d.date + 'T12:00:00'), delta);
          // nedovol jít na/před datum závodu
          if (date && isoDate(newDate) <= date) return d;
          return { ...d, date: isoDate(newDate) };
        }));
      };
      const setDostavbaSlots = (idx, n) =>
        setDostavbaDays(prev => prev.map((d, i) => i === idx ? { ...d, slotCount: n } : d));
      const toggleDostavbaSector = (idx, s) =>
        setDostavbaDays(prev => prev.map((d, i) => i === idx

              <div>
                <h2 className="text-2xl font-black tracking-widest text-pink-500 leading-none">PŘIDAT ZÁVOD</h2>

                <X c="w-5 h-5" />

            </div>

            {/* Body */}
            <div className="px-6 py-5 space-y-6">
              {/* Name */}
              <section>
                <h3 className="text-[11px] font-black uppercase tracking-widest text-zinc-400 mb-3">1 · Název závodu <span className="text-zinc-600 font-bold normal-case tracking-normal">(volitelné)</span></h3>
                <input type="text" value={name} onChange={e => setName(e.target.value)} maxLength={40}
                  placeholder="např. CB OPEN 2026"
                  className="w-full px-3.5 py-3 rounded-xl bg-zinc-900 ring-1 ring-zinc-800 focus:ring-pink-500 focus:ring-2 outline-none text-pink-400 text-sm font-black uppercase tracking-wider placeholder-zinc-600 placeholder:font-medium placeholder:normal-case placeholder:tracking-normal" />
              </section>

              {/* Date */}

                <h3 className="text-[11px] font-black uppercase tracking-widest text-zinc-400 mb-3">2 · Datum</h3>
                <DatePickerCalendar value={date} onChange={setDate} />

                  <p className="text-xs text-pink-400 font-bold mt-2">⚠ V tento den už závod je.</p>
                )}

              {/* Sectors */}

                  {LIMIT_SECTORS.map(s => {
                    const active = sectors.includes(s);
                    return (
                      <button key={s} onClick={() => toggleSector(s)}
                        className={`px-3 py-3 rounded-xl text-sm font-black uppercase tracking-wide transition-all
                          ${active
                            ? 'bg-pink-600 text-white ring-2 ring-pink-400'
                            : 'bg-zinc-900 text-zinc-300 ring-1 ring-zinc-800 hover:ring-zinc-700 hover:bg-zinc-800'}`}>
                        {s}

                  })}
                </div>

                <div className="grid grid-cols-8 gap-1.5">

                    return (
                      <button key={n} onClick={() => setSlotCount(n)}

                      const wdCap = wd.charAt(0).toUpperCase() + wd.slice(1);
                      const dayLabel = `${wdCap} ${d.getDate()}.${d.getMonth()+1}.`;
                      return (
                        <div key={i} className="bg-zinc-900 rounded-xl p-3 ring-1 ring-zinc-800 space-y-3">

                            <div className="flex items-center gap-1">

                                <ChevronLeft c="w-3.5 h-3.5" />
                              </button>
                              <span className="text-sm font-black text-white tabular-nums px-2">{dayLabel}</span>
                              <button onClick={() => shiftDostavbaDay(i, +1)}

                                <ChevronRight c="w-3.5 h-3.5" />
                              </button>

                                return (

                                        : 'bg-zinc-950 text-zinc-400 ring-1 ring-zinc-800 hover:ring-zinc-700 hover:text-zinc-200'}`}>
                                    {s}

                                );
                              })}
                            </div>

    // ── RaceCard (Limit brand) ───────────────────────────────────────────────
    // Karta závodu nebo dostavby. Pro dostavbu předej `kind="dostavba"` + `day` (1-indexed).
    function RaceCard({ race, day, sectors, slotCount, setters, kind = 'race', sel,
                        onSlotClick, onDragStartSlot, onDragOverSlot, onDropSlot, onDelete }) {
      const isDostavba = kind === 'dostavba';
      const dateIso = isDostavba ? day.date : race.date;
      const date = new Date(dateIso + 'T12:00:00');
      const rawDay = date.toLocaleString('cs-CZ', { weekday: 'long' });
      const displayDay = rawDay.charAt(0).toUpperCase() + rawDay.slice(1);
      const useSectors = isDostavba ? (day.sectors || []) : (sectors ?? race.sectors ?? []);
      const total = isDostavba ? (day.slotCount || 0) : (slotCount ?? race.slotCount ?? 0);
      const useSetters = isDostavba ? (day.setters || []) : (setters ?? race.setters ?? []);
      const filled = useSetters.slice(0, total).filter(Boolean).length;
      const allFilled = total > 0 && filled === total;
      const sectorActive = new Set();
      useSectors.forEach(s => { getLimitSectors(s).forEach(id => sectorActive.add(id)); });
      const slotProps = {
        sel,
        emptyBg: 'border-zinc-200 hover:border-pink-400 hover:bg-zinc-50',
        filledBg: 'bg-zinc-50 border-zinc-200',
        filledText: 'text-zinc-800',
        numEmpty: 'bg-zinc-100 text-zinc-400',
        selRing: 'ring-2 ring-pink-400 ring-offset-1',
        onDragOver: onDragOverSlot,
      };
      const limitSteps = [
        { id: 1, label: 'Dětská' },
        { id: 2, label: 'Přední převis' },
        { id: 3, label: 'Zadní převis' },
        { id: 4, label: 'Kolmice' },
      ];
      return (
        <div className="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-200 relative">
          {/* Delete (jen na hlavní kartě závodu) */}
          {!isDostavba && onDelete && (
            <button onClick={onDelete} title="Smazat závod"
              className="absolute top-2.5 right-2.5 z-10 inline-flex items-center gap-1 px-2 py-1 rounded-lg bg-zinc-800/90 text-pink-400 hover:bg-pink-600 hover:text-white transition-colors">
              <X c="w-3 h-3" />
              <span className="text-[10px] font-black uppercase tracking-widest">Smazat</span>
            </button>
          )}

          {/* Header */}
          <div className="bg-[#1e1e20] p-4 min-h-[13rem] flex flex-col justify-between text-white">
            <div className="flex items-start justify-between gap-3 pr-24">
              <div className="flex-1 min-w-0">
                <h3 className="text-xl font-black leading-none">{displayDay}</h3>
                <p className="text-sm font-medium text-white/50 mt-0.5">{fmtFull(date)}</p>
                {isDostavba ? (
                  <>
                    {race.name && (
                      <h4 className="mt-2 text-base font-black tracking-tight text-pink-500/80 leading-tight break-words uppercase">
                        {race.name}
                      </h4>
                    )}
                    <span className="inline-block mt-1 text-sm font-black tracking-widest text-pink-500">DOSTAVBA · LIMIT</span>
                  </>
                ) : race.name ? (
                  <>
                    <h4 className="mt-2 text-2xl font-black tracking-tight text-pink-500 leading-tight break-words uppercase">
                      {race.name}
                    </h4>
                    <span className="inline-block mt-1 text-[10px] font-black tracking-widest text-pink-400/60 uppercase">Závod · Limit</span>
                  </>
                ) : (
                  <span className="inline-block mt-2 text-sm font-black tracking-widest text-pink-500">ZÁVOD · LIMIT</span>
                )}
              </div>
            </div>

            {/* Sector badges */}
            <div className="mt-3 grid grid-cols-4 gap-1.5">
              {limitSteps.map(({ id, label }) => (
                <div key={id} className={`rounded-lg py-2.5 px-1 text-center
                  ${sectorActive.has(id) ? 'bg-pink-600 ring-1 ring-pink-400' : 'bg-white/5 ring-1 ring-white/10'}`}>
                  <div className={`text-xs font-black leading-tight
                    ${sectorActive.has(id) ? 'text-white' : 'text-white/30'}`}>
                    {label}
                  </div>
                </div>
              ))}
            </div>

            {/* Progress */}
            <div className="mt-3 flex items-center gap-2.5">
              <div className="flex-1 bg-white/10 rounded-full h-1.5">
                <div className="bg-[#e6007e] rounded-full h-1.5 transition-all duration-500"
                  style={{ width: `${total ? (filled / total) * 100 : 0}%` }} />
              </div>
              <span className={`text-xs font-bold tabular-nums ${allFilled ? 'text-[#e6007e]' : 'text-white/60'}`}>
                {allFilled && '✓ '}{filled}/{total}
              </span>
            </div>
          </div>

          {/* Slots */}
          <div className="p-3 space-y-2">
            {Array.from({ length: total }).map((_, i) => {
              const name = useSetters[i] ?? null;
              return (
                <Slot key={i} num={i+1} name={name} {...slotProps}
                  onClick={() => onSlotClick(i)}
                  onDragStart={() => onDragStartSlot(i, name)}
                  onDrop={() => onDropSlot(i)} />
              );
            })}
          </div>
        </div>
      );
    }

    // ── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [team,    setTeam]    = useState(() => {
        try {
          const s = localStorage.getItem('climbing-team');
          if (s) {
            const arr = JSON.parse(s);
            if (Array.isArray(arr) && arr.length) return arr;
          }
        } catch {}
        return TEAM;
      });
      const [hostInput,  setHostInput]  = useState('');
      const [addingHost, setAddingHost] = useState(false);
      const hostInputRef = React.useRef(null);
      const [offset,  setOffset]  = useState(0);
      const [data,    setData]    = useState(() => {
        try { const s = localStorage.getItem('climbing-setters'); return s ? JSON.parse(s) : {}; } catch { return {}; }
      });
      const [races,   setRaces]   = useState(() => {
        try { const s = localStorage.getItem('climbing-races'); return s ? JSON.parse(s) : {}; } catch { return {}; }
      });
      const [sel,     setSel]     = useState(null);
      const [drag,    setDrag]    = useState(null);  // { from, climber, session, idx? }
      const [showAddRace, setShowAddRace] = useState(false);
      const [firebaseReady, setFirebaseReady] = useState(false);
      const skipFirebaseWeeks = React.useRef(new Set());
      const skipFirebaseRaces = React.useRef(new Set());
      const skipFirebaseTeam  = React.useRef(false);
      const pendingFlushRef   = React.useRef(null);

      // ── Firestore helpers: null ↔ "__NULL__" ────────────────────────────────
      function toFirestore(weekData) {
        const out = {};
        for (const [k, v] of Object.entries(weekData)) {
          if (Array.isArray(v)) out[k] = v.map(x => x === null ? '__NULL__' : x);
          else if (v === null) out[k] = '__NULL__';
          else out[k] = v;
        }
        return out;
      }
      function fromFirestore(weekData) {
        const out = {};
        for (const [k, v] of Object.entries(weekData)) {
          if (Array.isArray(v)) out[k] = v.map(x => x === '__NULL__' ? null : x);
          else if (v === '__NULL__') out[k] = null;
          else out[k] = v;
        }
        return out;
      }

      // ── Load all data from Firestore on mount ─────────────────────────────
      React.useEffect(() => {

      const monday = addDays(getMonday(new Date()), offset * 7);

      const week   = data[key] ?? initWeek(key);
      // Skok o měsíc — přepočítá offset (v týdnech) na týden cílového měsíce
      function shiftMonth(delta) {

      // Závod NEBO dostavba, které mohou nahradit standardní Stavění sloty (Mon Lanovka / Wed Limit) když jsou zrušené.
      // Algoritmus: shromáždíme všechny race-day a dostavba-day položky v týdnu, pro každý zrušený slot
      // hledáme nejdřív shodu day-of-week (Mon=1, Wed=3, Thu=4 pro Dětská), pak fallback na cokoli.
      const _wkStartIso = weekKey(monday);
      const _wkEndIso   = weekKey(addDays(monday, 6));
      const _allWeekItems = [];
      Object.values(races || {}).forEach(race => {

        }
        (race.dostavba || []).forEach((day, dIdx) => {
          if (day?.date && day.date >= _wkStartIso && day.date <= _wkEndIso) {

      _allWeekItems.sort((a, b) => a.date.localeCompare(b.date));
      const _monCancelled = week?.monSectorOverride?.isOff === true;
      const _wedCancelled = week?.wedSectorOverride?.isOff === true;
      // Day-of-week (JS getDay: Ne=0, Po=1, ..., So=6) Lanovka a Limit dle aktuálního rozvrhu
      const _monDayMatch = 1 + lanovkaOffset(monday);                          // 1=Po nebo 2=Út
      const _wedDayMatch = 1 + limitOffset(monday, CAL[key]?.wed?.sector);     // 3=St nebo 4=Čt
      const _pool = [..._allWeekItems];
      const _consume = pred => {

      // Wed slot bere přednost (Limit) — je to obvyklejší případ pro závod
      const wedReplacement = _wedCancelled

        : null;

        ? (_consume(it => _dayOf(it) === _monDayMatch) || _consume(() => true))
        : null;
      const _remainingWeekItems = _pool;

      // Den stavění: Lanovka pondělí/úterý (od září 2026), Limit středa/čtvrtek (od září 2026 vždy čtvrtek)
      const monOffset = lanovkaOffset(monday);
      const wedOffset = limitOffset(monday, calWed?.sector);
      // Custom date overrides (for competitions etc.)
      // + 'T12:00:00' aby se ISO date-only string neparsoval jako UTC midnight (timezone off-by-one)
      const monDate = week.monDateOverride ? new Date(week.monDateOverride + 'T12:00:00') : addDays(monday, monOffset);
      const wedDate = week.wedDateOverride ? new Date(week.wedDateOverride + 'T12:00:00') : addDays(monday, wedOffset);
      const thuDate = week.thuDateOverride ? new Date(week.thuDateOverride + 'T12:00:00') : addDays(monday, 3);
      function setMonDate(iso) { setWeek({ ...week, monDateOverride: iso }); }
      function setWedDate(iso) { setWeek({ ...week, wedDateOverride: iso }); }
      function setThuDate(iso) { setWeek({ ...week, thuDateOverride: iso }); }

      function setWeek(w) { setData(d => ({ ...d, [key]: w })); }

      // ── Posunout stavění (odložit o 7 dní) ────────────────────────────────
      function toIso(d) {

      function shiftMonSector() {

      function undoMonShift() {
