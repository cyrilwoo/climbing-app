    // ── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [team,    setTeam]    = useState(TEAM);
      const [offset,  setOffset]  = useState(0);
      const [data,    setData]    = useState(() => {
        try { const s = localStorage.getItem('climbing-setters'); return s ? JSON.parse(s) : {}; } catch { return {}; }
      });
      const [sel,     setSel]     = useState(null);
      const [drag,    setDrag]    = useState(null);  // { from, climber, session, idx? }
      const [firebaseReady, setFirebaseReady] = useState(false);
      const skipFirebaseWeeks = React.useRef(new Set());

      // ── Firestore helpers: null ↔ "__NULL__" ────────────────────────────────
      function toFirestore(weekData) {
        const out = {};
        for (const [k, v] of Object.entries(weekData)) {
          if (Array.isArray(v)) out[k] = v.map(x => x === null ? '__NULL__' : x);
          else if (v === null) out[k] = '__NULL__';
          else out[k] = v;
        }
        return out;
      }
      function fromFirestore(weekData) {
        const out = {};
        for (const [k, v] of Object.entries(weekData)) {
          if (Array.isArray(v)) out[k] = v.map(x => x === '__NULL__' ? null : x);
          else if (v === '__NULL__') out[k] = null;
          else out[k] = v;
        }
        return out;
      }

      // ── Load all data from Firestore on mount ─────────────────────────────
      React.useEffect(() => {
        db.collection('weeks').get().then(snapshot => {
          if (!snapshot.empty) {
            const loaded = {};
            snapshot.forEach(doc => { loaded[doc.id] = fromFirestore(doc.data()); });
            setData(prev => {
              const merged = { ...prev, ...loaded };
              return merged;
            });
          }
          setFirebaseReady(true);
        }).catch(() => { setFirebaseReady(true); });

        // Real-time listener: sync changes from other users
        const unsub = db.collection('weeks').onSnapshot(snapshot => {
          const loaded = {};
          snapshot.forEach(doc => {
            if (skipFirebaseWeeks.current.has(doc.id)) {
              skipFirebaseWeeks.current.delete(doc.id);
              return; // vlastní zápis — přeskoč
            }
            loaded[doc.id] = fromFirestore(doc.data());
          });
          setData(prev => {
            const merged = { ...prev, ...loaded };
            return JSON.stringify(merged) !== JSON.stringify(prev) ? merged : prev;
          });
        });
        return () => unsub();
      }, []);

      // ── Save to localStorage + Firestore when data changes ────────────────
      React.useEffect(() => {
        try { localStorage.setItem('climbing-setters', JSON.stringify(data)); } catch {}
        window.__appData = data;
        if (!firebaseReady) return;
        // Debounce Firestore writes
        const t = setTimeout(() => {
          Object.entries(data).forEach(([weekId, weekData]) => {
            skipFirebaseWeeks.current.add(weekId);
            // Derive effective sector + build dates for calendar sync
            const calMon = weekData.monSectorOverride ?? CAL[weekId]?.mon ?? null;
            const calWed = weekData.wedSectorOverride ?? CAL[weekId]?.wed ?? null;
            const calThu = CAL[weekId]?.thu ?? null;
            const monBase = new Date(weekId + 'T12:00:00');
            const wOff = isDetskaWed(calWed?.sector) ? 3 : 2;
            const enriched = {
              ...weekData,
              _monSector: (calMon && !calMon.isOff && calMon.sector) ? calMon.sector : null,
              _wedSector: (calWed && !calWed.isOff && calWed.sector) ? calWed.sector : null,
              _thuSector: (calThu && !calThu.isOff && calThu.sector) ? calThu.sector : null,
              _monDate:   weekData.monDateOverride || weekId,
              _wedDate:   weekData.wedDateOverride || toIso(addDays(monBase, wOff)),
              _thuDate:   weekData.thuDateOverride || toIso(addDays(monBase, 3)),
              _monCancelled: weekData.monCancelledSetters != null ? true : null,
              _wedCancelled: weekData.wedCancelledSetters != null ? true : null,
              _monShifted: weekData.monSavedSetters != null ? true : null,
              _wedShifted: weekData.wedSavedSetters != null ? true : null,
            };
            db.collection('weeks').doc(weekId).set(toFirestore(enriched), { merge: true }).catch(() => {});
          });
        }, 800);
        return () => clearTimeout(t);
      }, [data, firebaseReady]);

      const monday = addDays(getMonday(new Date()), offset * 7);
      const friday = addDays(monday, 4);
      const key    = weekKey(monday);
      const week   = data[key] ?? initWeek(key);
      const calMon = week.monSectorOverride ?? CAL[key]?.mon ?? null;
      const calWed = week.wedSectorOverride ?? CAL[key]?.wed ?? null;
      const calThu = CAL[key]?.thu ?? null;

      // Dětská na Limitu se staví ve čtvrtek (+3), ostatní sektory ve středu (+2)
      const wedOffset = isDetskaWed(calWed?.sector) ? 3 : 2;
      // Custom date overrides (for competitions etc.)
      const monDate = week.monDateOverride ? new Date(week.monDateOverride) : monday;
      const wedDate = week.wedDateOverride ? new Date(week.wedDateOverride) : addDays(monday, wedOffset);
      const thuDate = week.thuDateOverride ? new Date(week.thuDateOverride) : addDays(monday, 3);
      function setMonDate(iso) { setWeek({ ...week, monDateOverride: iso }); }
      function setWedDate(iso) { setWeek({ ...week, wedDateOverride: iso }); }
      function setThuDate(iso) { setWeek({ ...week, thuDateOverride: iso }); }

      function setWeek(w) { setData(d => ({ ...d, [key]: w })); }

      // ── Posunout stavění (odložit o 7 dní) ────────────────────────────────
      function toIso(d) {
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      }
      function shiftMonSector() {
        const nextKey = toIso(addDays(new Date(key + 'T12:00:00'), 7));
        const nextWeekData = data[nextKey] ?? initWeek(nextKey);
        // Only shift the sector/profile — setters/sundavači stay tied to their date (cleared here, not moved)
        setData(d => ({
          ...d,
          [nextKey]: { ...nextWeekData, monSectorOverride: calMon },
          [key]: { ...week,
            monday: E4(), mondayLano: null, mondaySundavaci: [], mondayMyti: null,
            monSectorOverride: { isOff: true, sector: 'Volný týden' },
            monSavedSetters: week.monday, monSavedLano: week.mondayLano,
            monSavedSundavaci: week.mondaySundavaci || [], monSavedMyti: week.mondayMyti,
          }
        }));
      }
      function shiftWedSector() {
        const nextKey = toIso(addDays(new Date(key + 'T12:00:00'), 7));
        const nextWeekData = data[nextKey] ?? initWeek(nextKey);
        // Only shift the sector/profile — setters/sundavači stay tied to their date (cleared here, not moved)
        setData(d => ({
          ...d,
          [nextKey]: { ...nextWeekData, wedSectorOverride: calWed },
          [key]: { ...week,
            wednesday: E4(), wednesdaySundavaci: [], wednesdayMyti: null,
            wedSectorOverride: { isOff: true, sector: 'Volný týden' },
            wedSavedSetters: week.wednesday,
            wedSavedSundavaci: week.wednesdaySundavaci || [], wedSavedMyti: week.wednesdayMyti,
          }
        }));
      }

      function undoMonShift() {
        const nextKey = toIso(addDays(new Date(key + 'T12:00:00'), 7));
        setData(d => {
          const curr = { ...week };
          if (curr.monSavedSetters) { curr.monday = curr.monSavedSetters; curr.mondayLano = curr.monSavedLano ?? null; }
          curr.mondaySundavaci = curr.monSavedSundavaci || [];
          curr.mondayMyti = curr.monSavedMyti ?? null;
          curr.monSectorOverride = null;
          curr.monSavedSetters = null; curr.monSavedLano = null;
          curr.monSavedSundavaci = null; curr.monSavedMyti = null;
          const updates = { ...d, [key]: curr };
          if (d[nextKey]) {
            // Only clear the sector override — keep next week's setters (they belong to that date)
            updates[nextKey] = { ...d[nextKey], monSectorOverride: null };
          }
          return updates;
        });
      }
      function undoWedShift() {
        const nextKey = toIso(addDays(new Date(key + 'T12:00:00'), 7));
        setData(d => {
          const curr = { ...week };
          if (curr.wedSavedSetters) { curr.wednesday = curr.wedSavedSetters; }
          curr.wednesdaySundavaci = curr.wedSavedSundavaci || [];
          curr.wednesdayMyti = curr.wedSavedMyti ?? null;
          curr.wedSectorOverride = null;
          curr.wedSavedSetters = null;
          curr.wedSavedSundavaci = null; curr.wedSavedMyti = null;
          const updates = { ...d, [key]: curr };
          if (d[nextKey]) {
            // Only clear the sector override — keep next week's setters (they belong to that date)
            updates[nextKey] = { ...d[nextKey], wedSectorOverride: null };
          }
          return updates;
        });
      }

      // ── Smazat stavění (volný týden) ──────────────────────────────────────
      function cancelMonSector() {
        setWeek({
          ...week,
          monday: E4(), mondayLano: null, mondaySundavaci: [], mondayMyti: null,
          monSectorOverride: { isOff: true, sector: 'Volný týden' },
          monCancelledSetters: week.monday,
          monCancelledLano: week.mondayLano,
          monCancelledSundavaci: week.mondaySundavaci || [],
          monCancelledMyti: week.mondayMyti,
        });
      }
      function undoMonCancel() {
        setWeek({
          ...week,
          monday: week.monCancelledSetters || E4(),
          mondayLano: week.monCancelledLano ?? null,
          mondaySundavaci: week.monCancelledSundavaci || [],
          mondayMyti: week.monCancelledMyti ?? null,
          monSectorOverride: null,
          monCancelledSetters: null, monCancelledLano: null,
          monCancelledSundavaci: null, monCancelledMyti: null,
        });
      }
      function cancelWedSector() {
        setWeek({
          ...week,
          wednesday: E4(), wednesdaySundavaci: [], wednesdayMyti: null,
          wedSectorOverride: { isOff: true, sector: 'Volný týden' },
          wedCancelledSetters: week.wednesday,
          wedCancelledSundavaci: week.wednesdaySundavaci || [],
          wedCancelledMyti: week.wednesdayMyti,
        });
      }
      function undoWedCancel() {
        setWeek({
          ...week,
          wednesday: week.wedCancelledSetters || E4(),
          wednesdaySundavaci: week.wedCancelledSundavaci || [],
          wednesdayMyti: week.wedCancelledMyti ?? null,
          wedSectorOverride: null,
          wedCancelledSetters: null, wedCancelledSundavaci: null, wedCancelledMyti: null,
        });
      }

      // ── Badge helpers (display only) ──────────────────────────────────────
      function isMonday(c)    { return week.monday.includes(c) || week.mondayLano === c; }
      function isWednesday(c) { return week.wednesday.includes(c); }

      // ── Assign / remove ───────────────────────────────────────────────────
      function assign(climber, session, idx) {

        if (session === 'mondayLano') {
          if (week.mondayLano !== null) return false;
          setWeek({ ...week, mondayLano: climber });
          return true;
        }
        if (week[session][idx] !== null) return false;
        if (week[session].includes(climber)) return false;
        setWeek({ ...week, [session]: week[session].map((s,i) => i === idx ? climber : s) });
        return true;
      }

      function remove(session, idx) {
        if (session === 'mondayLano') {
          const c = week.mondayLano;
          setWeek({ ...week, mondayLano: null });
          if (sel === c) setSel(null);
          return;
        }
        const c = week[session][idx];
        setWeek({ ...week, [session]: week[session].map((s,i) => i === idx ? null : s) });
        if (sel === c) setSel(null);
      }

      function clearSession(session) {
        if (session === 'monday') {
          setWeek({ ...week, monday: E4(), mondayLano: null, mondaySundavaci: [], mondayMyti: null });
        } else if (session === 'wednesday') {
          setWeek({ ...week, wednesday: E4(), wednesdaySundavaci: [], wednesdayMyti: null });
        } else {
          setWeek({ ...week, thursday: E4() });
        }
        setSel(null);
      }
      function clearWeek() {
        if (!window.confirm('Resetovat celý týden? Smažou se všichni stavěči, sundavači i případný posun/zrušení.')) return;
        setData(d => { const n={...d}; delete n[key]; return n; });
        setSel(null);
      }
      function toggleSundavac(session, name) {
        const fld = session === 'monday' ? 'mondaySundavaci' : 'wednesdaySundavaci';
        const curr = week[fld] || [];
        setWeek({ ...week, [fld]: curr.includes(name) ? curr.filter(x => x !== name) : [...curr, name] });
      }
      function toggleMyti(session, name) {
        const fld = session === 'monday' ? 'mondayMyti' : 'wednesdayMyti';
        setWeek({ ...week, [fld]: week[fld] === name ? null : name });
      }

      // ── Click ─────────────────────────────────────────────────────────────
      function onSlotClick(session, idx) {
        if (week[session][idx]) remove(session, idx);
        else if (sel) assign(sel, session, idx);
        // sel stays active — assign to multiple slots/sessions in one go
      }
      function onLanoClick() {
        if (week.mondayLano) remove('mondayLano', 0);
        else if (sel) assign(sel, 'mondayLano', 0);
      }
      function onChipClick(name) { setSel(s => s === name ? null : name); }
      function onThuSlotClick(idx) {
        if ((week.thursday || E4())[idx]) remove('thursday', idx);
        else if (sel) assign(sel, 'thursday', idx);
      }

      // ── Team management ───────────────────────────────────────────────────
      function deleteClimber(name) {
        setTeam(t => t.filter(x => x !== name));
        if (sel === name) setSel(null);
        setData(d => {
          const out = {};
          for (const [k,w] of Object.entries(d)) {
            const nullify = v => v === name ? null : v;
            const nullifyArr = a => (a || []).map(nullify);
            const filterArr = a => (a || []).filter(x => x !== name);
            out[k] = {
              ...w,
              monday:    nullifyArr(w.monday),
              mondayLano: nullify(w.mondayLano),
              wednesday: nullifyArr(w.wednesday),
              thursday:  nullifyArr(w.thursday),
              mondaySundavaci: filterArr(w.mondaySundavaci),
              mondayMyti: nullify(w.mondayMyti),
              wednesdaySundavaci: filterArr(w.wednesdaySundavaci),
              wednesdayMyti: nullify(w.wednesdayMyti),
              // preserve saved/cancelled arrays too
              monSavedSetters: nullifyArr(w.monSavedSetters),
              monSavedSundavaci: filterArr(w.monSavedSundavaci),
              wedSavedSetters: nullifyArr(w.wedSavedSetters),
              wedSavedSundavaci: filterArr(w.wedSavedSundavaci),
              monCancelledSetters: nullifyArr(w.monCancelledSetters),
              monCancelledSundavaci: filterArr(w.monCancelledSundavaci),
              wedCancelledSetters: nullifyArr(w.wedCancelledSetters),
              wedCancelledSundavaci: filterArr(w.wedCancelledSundavaci),
            };
          }
          return out;
        });
      }

      // ── Drag ──────────────────────────────────────────────────────────────
      function onDragStartPool(name) { setDrag({ from:'pool', climber:name }); setSel(null); }
      function onDragStartSlot(session, idx, name) { setDrag({ from:'slot', climber:name, session, idx }); }
      function onDragStartLano(name) { if (name) setDrag({ from:'lano', climber:name }); }

      function onDropSlot(session, idx) {
        if (!drag) return;
        const { from, climber, session: src, idx: srcIdx } = drag;
        setDrag(null);
        if (from === 'pool') {
          assign(climber, session, idx);
        } else if (from === 'lano') {
          // lano → regular slot
          if (week[session][idx] !== null) return;
          setWeek({ ...week, mondayLano: null,
            [session]: week[session].map((s,i) => i===idx ? climber : s) });
        } else {
          if (src === session) {
            if (idx === srcIdx || week[session][idx] !== null) return;
            const s = [...week[session]]; s[srcIdx]=null; s[idx]=climber;
            setWeek({ ...week, [session]: s });
          } else {
            // cross-session drag: remove from source, assign to target in one update
            if (week[session][idx] !== null) return;
            if (week[session].includes(climber)) return;
            const newSrc = [...week[src]]; newSrc[srcIdx] = null;
            const newDst = [...week[session]]; newDst[idx] = climber;
            setWeek({ ...week, [src]: newSrc, [session]: newDst });
          }
        }
      }
      function onDropLano() {
        if (!drag) return;
        const { from, climber, session: src, idx: srcIdx } = drag;
        setDrag(null);
        if (from === 'pool') {
          assign(climber, 'mondayLano', 0);
        } else if (from === 'slot') {
          if (week.mondayLano !== null) return;
          const s = [...week[src]]; s[srcIdx] = null;
          setWeek({ ...week, [src]: s, mondayLano: climber });
        }
      }
      function onDropPool() {
        if (!drag) return;
        if (drag.from === 'slot') remove(drag.session, drag.idx);
        else if (drag.from === 'lano') remove('mondayLano', 0);
        setDrag(null);
      }

      // ── Statistics ────────────────────────────────────────────────────────
      function computeStats() {
        const now = new Date();
        const thisYear  = now.getFullYear();
        const thisMonth = now.getMonth(); // 0-indexed
        const stats = {};
        TEAM.forEach(n => { stats[n] = { month: 0, year: 0 }; });

        function countWeek(wd, defaultMonDate, calEntry) {
          const effectiveMon = wd.monDateOverride ? new Date(wd.monDateOverride) : defaultMonDate;
          const effWedSector = wd.wedSectorOverride?.sector ?? calEntry?.wed?.sector;
          const wOff = isDetskaWed(effWedSector) ? 3 : 2;
          const effectiveWed = wd.wedDateOverride ? new Date(wd.wedDateOverride) : addDays(defaultMonDate, wOff);
          function tally(name, date) {
            if (!name || !stats[name]) return;
            if (date.getFullYear() === thisYear) {
              stats[name].year++;
              if (date.getMonth() === thisMonth) stats[name].month++;
            }
          }
          (wd.monday || []).forEach(s => tally(s, effectiveMon));
          tally(wd.mondayLano, effectiveMon);
          (wd.wednesday || []).forEach(s => tally(s, effectiveWed));
          const effectiveThu = wd.thuDateOverride ? new Date(wd.thuDateOverride) : addDays(defaultMonDate, 3);
          (wd.thursday || []).forEach(s => tally(s, effectiveThu));
        }

        // All weeks from CAL — only count weeks where user has explicitly saved data
        // (initWeek adds Cyril as default setter which would inflate his stats)
        Object.keys(CAL).forEach(k => {
          if (!data[k]) return;
          const [y, m, d] = k.split('-').map(Number);
          const monDate = new Date(y, m-1, d);
          countWeek(data[k], monDate, CAL[k]);
        });
        // Any user-edited weeks outside CAL
        Object.keys(data).forEach(k => {
          if (!CAL[k]) {
            const [y, m, d] = k.split('-').map(Number);
            countWeek(data[k], new Date(y, m-1, d), null);
          }
        });
        return stats;
      }

      function computeRemovalStats() {
        const now = new Date();
        const thisYear  = now.getFullYear();
        const thisMonth = now.getMonth();
        const stats = {};
        REMOVAL_TEAM.forEach(n => { stats[n] = { sundMonth: 0, sundYear: 0, mytiMonth: 0, mytiYear: 0 }; });
        function tally(name, date, field) {
          if (!name || !stats[name]) return;
          if (date.getFullYear() === thisYear) {
            stats[name][field + 'Year']++;
            if (date.getMonth() === thisMonth) stats[name][field + 'Month']++;
          }
        }
        // Only count weeks where user has saved data (same reason as computeStats)
        const allKeys = new Set(Object.keys(data));
        allKeys.forEach(k => {
          const [y, m, d] = k.split('-').map(Number);
          const monDate = new Date(y, m-1, d);
          const wd = data[k];
          const wOff = isDetskaWed(CAL[k]?.wed?.sector) ? 3 : 2;
          const wedDate = wd.wedDateOverride ? new Date(wd.wedDateOverride) : addDays(monDate, wOff);
          const sundMon = addDays(wd.monDateOverride ? new Date(wd.monDateOverride) : monDate, -1);
          const sundWed = addDays(wedDate, -1);
          (wd.mondaySundavaci || []).forEach(n => tally(n, sundMon, 'sund'));
          tally(wd.mondayMyti, sundMon, 'myti');
          (wd.wednesdaySundavaci || []).forEach(n => tally(n, sundWed, 'sund'));
          tally(wd.wednesdayMyti, sundWed, 'myti');
        });
        return stats;
      }

      const isNow = offset === 0;

      return (
        <div className="min-h-screen bg-slate-100 pt-24">

          {/* Header */}
          <header className="bg-white border-b border-gray-200 fixed top-0 left-0 right-0 w-full z-50 shadow-sm">
            <div className="max-w-2xl mx-auto px-4 pt-3 pb-2">
              {/* Top row: title + navigation */}
              <div className="flex items-center justify-between gap-3">
                <div className="min-w-0">
                  <p className="text-base font-bold text-gray-900 leading-none">Stavění</p>
                  <p className="text-xs text-gray-400 mt-0.5">Týdenní plán stavěčů</p>
                </div>
              <div className="flex items-center gap-1 flex-shrink-0">
                <button onClick={() => setOffset(o => o-1)}
                  className="p-2 rounded-xl hover:bg-gray-100 text-gray-600 transition-colors">
                  <ChevronLeft c="w-5 h-5" />
                </button>
                <div className="text-center min-w-[138px] px-1">
                  <p className="text-sm font-bold text-gray-900 tabular-nums">
                    {fmt(monday)} – {fmt(friday)}{friday.getFullYear()}
                  </p>
                  <p className={`text-xs font-semibold mt-0.5 ${isNow ? 'text-amber-600' : 'text-gray-400'}`}>
                    {isNow ? 'Aktuální týden' : `Týden ${offset>0?'+':''}${offset}`}
                  </p>
                </div>
                <button onClick={() => setOffset(o => o+1)}
                  className="p-2 rounded-xl hover:bg-gray-100 text-gray-600 transition-colors">
                  <ChevronRight c="w-5 h-5" />
                </button>
              </div>
              </div>
              {/* Second row: fill indicators */}
              {(() => {
                const monMax = calMon?.sector && !calMon.isOff ? getLanovkaSlotCount(calMon.sector) : 0;
                const wedMax = calWed?.sector && !calWed.isOff ? getWedSlotCount(calWed.sector) : 0;
                const monFill = monMax ? week.monday.slice(0,monMax).filter(Boolean).length + (week.mondayLano ? 1 : 0) : 0;
                const monTot  = monMax ? monMax + 1 : 0;
                const wedFill = wedMax ? week.wednesday.slice(0,wedMax).filter(Boolean).length : 0;
                const thuFill = (week.thursday||[]).slice(0,2).filter(Boolean).length;
                const monPct  = monTot ? Math.round(monFill/monTot*100) : 0;
                const wedPct  = wedMax ? Math.round(wedFill/wedMax*100) : 0;
                const thuPct  = calThu ? Math.round(thuFill/2*100) : 0;
                return (
                  <div className="flex items-center justify-center gap-2 mt-2">
                    <span className={`text-sm font-black px-3 py-1 rounded-full
                      ${monMax && monFill===monTot ? 'bg-amber-500 text-white' : monMax ? 'bg-amber-100 text-amber-800' : 'bg-gray-100 text-gray-400'}`}>
                      Lanovka {monPct}%
                    </span>
                    <span className={`text-sm font-black px-3 py-1 rounded-full
                      ${wedMax && wedFill===wedMax ? 'bg-pink-600 text-white' : wedMax ? 'bg-zinc-800 text-white' : 'bg-gray-100 text-gray-400'}`}>
                      Limit {wedPct}%
                    </span>
                    <span className={`text-sm font-black px-3 py-1 rounded-full
                      ${calThu && thuFill===2 ? 'bg-emerald-600 text-white' : calThu ? 'bg-emerald-100 text-emerald-800' : 'bg-gray-100 text-gray-400'}`}>
                      Tělocvična {thuPct}%
                    </span>
                  </div>
                );
              })()}
            </div>
          </header>

          <main className="max-w-none mx-auto px-4 py-5 pb-10 flex flex-col lg:flex-row gap-5 items-start">

            {/* Main content column */}
            <div className="flex-1 min-w-0 space-y-4">

            {/* Řádky 1+2: Sundavání + Stavění — jeden scroll container */}
            <div className="overflow-x-auto snap-x snap-mandatory lg:snap-none relative z-0">
              <div className="flex flex-col gap-4 w-fit">

                {/* Řádek 1: Sundavání — zobraz jen pokud má týden stavění */}
                {(!calMon?.isOff || !calWed?.isOff) && (
                <div className="flex gap-4">
                  {!calMon?.isOff && (
                  <div className="w-[calc(100vw-2rem)] lg:w-72 flex-shrink-0 snap-start">
                    <SundavaniCard session="monday" theme="yellow" date={addDays(monDate, -1)}
                      sundavaci={week.mondaySundavaci || []} myti={week.mondayMyti || null}
                      onToggleSundavac={name => toggleSundavac('monday', name)}
                      onToggleMyti={name => toggleMyti('monday', name)} />
                  </div>
                  )}
                  {!calWed?.isOff && (
                  <div className="w-[calc(100vw-2rem)] lg:w-72 flex-shrink-0 snap-start">
                    <SundavaniCard session="wednesday" theme="dark" date={addDays(wedDate, -1)}
                      sundavaci={week.wednesdaySundavaci || []} myti={week.wednesdayMyti || null}
                      onToggleSundavac={name => toggleSundavac('wednesday', name)}
                      onToggleMyti={name => toggleMyti('wednesday', name)} />
                  </div>
                  )}
                  {calThu && <div className="w-[calc(100vw-2rem)] lg:w-72 flex-shrink-0" />}
                </div>
                )}

                {/* Řádek 2: Stavění */}
                <div className="flex gap-4">
                  <div className="w-[calc(100vw-2rem)] lg:w-72 flex-shrink-0 snap-start">
                    <SessionCard
                      session="monday" day="Pondělí" date={monDate} theme="yellow"
                      slots={week.monday} lanoSlot={week.mondayLano} calInfo={calMon}
                      sel={sel}
                      onSlotClick={i => onSlotClick('monday', i)}
                      onDragStartSlot={(i,n) => onDragStartSlot('monday',i,n)}
                      onDragOverSlot={e => e.preventDefault()}
                      onDropSlot={i => onDropSlot('monday', i)}
                      onLanoClick={onLanoClick}
                      onDragStartLano={onDragStartLano}
                      onDropLano={onDropLano}
                      onClear={() => clearSession('monday')}
                      onDateChange={setMonDate}
                      onShift={shiftMonSector}
                      nextSector={getNextSector(key, 'mon')}
                    />
                  </div>
                  <div className="w-[calc(100vw-2rem)] lg:w-72 flex-shrink-0 snap-start">
                    <SessionCard
                      session="wednesday" day={isDetskaWed(calWed?.sector) ? "Čtvrtek" : "Středa"} date={wedDate} theme="dark"
                      slots={week.wednesday} calInfo={calWed}
                      sel={sel}
                      onSlotClick={i => onSlotClick('wednesday', i)}
                      onDragStartSlot={(i,n) => onDragStartSlot('wednesday',i,n)}
                      onDragOverSlot={e => e.preventDefault()}
                      onDropSlot={i => onDropSlot('wednesday', i)}
                      onClear={() => clearSession('wednesday')}
                      onDateChange={setWedDate}
                      onShift={shiftWedSector}
                      nextSector={getNextSector(key, 'wed')}
                    />
                  </div>
                  {calThu && (
                    <div className="w-[calc(100vw-2rem)] lg:w-72 flex-shrink-0 snap-start">
                      <SessionCard
                        session="thursday" day="Čtvrtek" date={thuDate} theme="green"
                        slots={week.thursday || E4()} calInfo={calThu}
                        sel={sel}
                        onSlotClick={i => onThuSlotClick(i)}
                        onDragStartSlot={(i,n) => onDragStartSlot('thursday',i,n)}
                        onDragOverSlot={e => e.preventDefault()}
                        onDropSlot={i => onDropSlot('thursday', i)}
                        onClear={() => clearSession('thursday')}
                        onDateChange={setThuDate}
                      />
                    </div>
                  )}
                </div>

              </div>
            </div>

            {/* Climber pool */}
            <div className="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden"
              onDragOver={e => e.preventDefault()} onDrop={onDropPool}>

              <div className="px-4 pt-4 pb-3 border-b border-gray-100">
                <div className="flex items-center justify-between mb-3">
                  <h2 className="font-bold text-gray-900 flex items-center gap-2">
                    <UserIcon c="w-4 h-4 text-gray-400" />
                    Stavěči
                    <span className="text-xs font-semibold text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">
                      {team.length}
                    </span>
                  </h2>
                  <div className="flex items-center gap-2">
                    {sel && (
                      <span className="hidden sm:flex items-center gap-1 text-xs font-semibold text-gray-700 bg-gray-100 border border-gray-200 px-2.5 py-1 rounded-full">
                        <Check c="w-3 h-3" />{sel}
                      </span>
                    )}
                    <button onClick={clearWeek}
                      className="flex items-center gap-1 text-xs text-gray-400 hover:text-red-500 transition-colors py-1">
                      <RotateCcw c="w-3.5 h-3.5" />
                      Resetovat týden
                    </button>
                  </div>
                </div>
              </div>

              <div className="px-4 py-3 flex flex-wrap gap-2 min-h-[64px] justify-center items-start content-start">
                {team.map(name => (
                    <ClimberChip key={name} name={name}
                      isSelected={sel === name}
                      inMon={isMonday(name)}
                      inWed={isWednesday(name)}
                      onClick={() => onChipClick(name)}
                      onRemove={() => deleteClimber(name)}
                      onDragStart={() => onDragStartPool(name)} />
                  ))
                }
              </div>

              {/* Stats — mobile only, right below setter chips */}
              <div className="lg:hidden px-4 pb-2 space-y-3">
                <MonthlyOccupancy data={data} />
                <StatsPanel stats={computeStats()} team={team} />
                <RemovalStatsPanel stats={computeRemovalStats()} />
              </div>

              {drag && (
                <div className="mx-4 mb-3 border-2 border-dashed border-red-200 rounded-xl px-4 py-2.5 text-center text-xs font-medium text-red-400 bg-red-50">
                  Přetáhněte sem pro odebrání ze slotu
                </div>
              )}
              {sel && (
                <div className="mx-4 mb-3 border border-amber-100 rounded-xl px-4 py-2.5 text-center text-xs font-medium text-amber-700 bg-amber-50">
                  Klikněte na volný slot pro přiřazení &nbsp;
                  <button onClick={() => setSel(null)} className="underline underline-offset-2 text-amber-500 hover:text-amber-700">
                    Zrušit
                  </button>
                </div>
              )}
            </div>

            {/* Year plan */}
            <YearPlan />

            {/* Posunout / Smazat stavění — zřídka používané, dole */}
            {(calMon || calWed) && (
              <div className="flex gap-2 mt-2 flex-wrap">
                {/* Lanovka — posunout */}
                {calMon && !calMon.isOff && (
                  <button onClick={shiftMonSector}
                    className="flex items-center gap-2 px-3 py-2 rounded-xl text-xs font-bold
                      border border-amber-200 text-amber-600 hover:bg-amber-50 transition-colors">
                    Posunout — {calMon.sector}
                    <span className="bg-amber-100 text-amber-800 px-2 py-0.5 rounded-lg font-black">
                      → {fmt(addDays(monday, 7))}
                    </span>
                  </button>
                )}
                {/* Lanovka — smazat */}
                {calMon && !calMon.isOff && (
                  <button onClick={cancelMonSector}
                    className="flex items-center gap-2 px-3 py-2 rounded-xl text-xs font-bold
                      border border-red-200 text-red-500 hover:bg-red-50 transition-colors">
                    Smazat stavění — {calMon.sector}
                  </button>
                )}
                {/* Lanovka — vrátit po posunu */}
                {week.monSectorOverride?.sector === 'Volný týden' && week.monSavedSetters && (
                  <button onClick={undoMonShift}
                    className="flex items-center gap-2 px-3 py-2 rounded-xl text-xs font-bold
                      border border-amber-200 text-amber-600 hover:bg-amber-50 transition-colors">
                    ↩ Vrátit Lanovka
                  </button>
                )}
                {/* Lanovka — vrátit po smazání */}
                {week.monCancelledSetters && (
                  <button onClick={undoMonCancel}
                    className="flex items-center gap-2 px-3 py-2 rounded-xl text-xs font-bold
                      border border-red-200 text-red-500 hover:bg-red-50 transition-colors">
                    ↩ Obnovit Lanovka
                  </button>
                )}
                {/* Limit — posunout */}
                {calWed && !calWed.isOff && (
                  <button onClick={shiftWedSector}
                    className="flex items-center gap-2 px-3 py-2 rounded-xl text-xs font-bold
                      border border-zinc-200 text-zinc-500 hover:bg-zinc-50 transition-colors">
                    Posunout — {calWed.sector}
                    <span className="bg-zinc-100 text-zinc-700 px-2 py-0.5 rounded-lg font-black">
                      → {fmt(addDays(monday, 7))}
                    </span>
                  </button>
                )}
                {/* Limit — smazat */}
                {calWed && !calWed.isOff && (
                  <button onClick={cancelWedSector}
                    className="flex items-center gap-2 px-3 py-2 rounded-xl text-xs font-bold
                      border border-red-200 text-red-500 hover:bg-red-50 transition-colors">
                    Smazat stavění — {calWed.sector}
                  </button>
                )}
                {/* Limit — vrátit po posunu */}
                {week.wedSectorOverride?.sector === 'Volný týden' && week.wedSavedSetters && (
                  <button onClick={undoWedShift}
                    className="flex items-center gap-2 px-3 py-2 rounded-xl text-xs font-bold
                      border border-zinc-200 text-zinc-500 hover:bg-zinc-50 transition-colors">
                    ↩ Vrátit Limit
                  </button>
                )}
                {/* Limit — vrátit po smazání */}
                {week.wedCancelledSetters && (
                  <button onClick={undoWedCancel}
                    className="flex items-center gap-2 px-3 py-2 rounded-xl text-xs font-bold
                      border border-red-200 text-red-500 hover:bg-red-50 transition-colors">
                    ↩ Obnovit Limit
                  </button>
                )}
              </div>
            )}

            </div>{/* end main content column */}

            {/* Stats sidebar */}
            <div className="lg:w-48 lg:flex-shrink-0 lg:sticky lg:top-20 space-y-3">
              <div className="hidden lg:block">
              {!isNow && (() => {
                const todayMonday = getMonday(new Date());
                const todayKey = weekKey(todayMonday);
                const todayCalMon = CAL[todayKey]?.mon ?? null;
                const todayCalWed = CAL[todayKey]?.wed ?? null;
                const todayWedOff = isDetskaWed(todayCalWed?.sector) ? 3 : 2;
                const todayWedDate = addDays(todayMonday, todayWedOff);
                const fmtDate = d => d.toLocaleDateString('cs-CZ', { day: 'numeric', month: 'numeric' });
                return (
                  <div className="rounded-2xl bg-amber-50 ring-1 ring-amber-200 p-3 space-y-2">
                    <div className="text-xs font-black text-amber-700 uppercase tracking-wide">Dnes</div>
                    {todayCalMon && !todayCalMon.isOff && (
                      <div className="space-y-0.5">
                        <div className="text-xs text-amber-600 font-semibold">{fmtDate(todayMonday)} Lanovka</div>
                        <div className="text-xs font-black text-amber-900 leading-tight">{todayCalMon.sector}</div>
                      </div>
                    )}
                    {todayCalWed && !todayCalWed.isOff && (
                      <div className="space-y-0.5">
                        <div className="text-xs text-pink-600 font-semibold">{fmtDate(todayWedDate)} Limit</div>
                        <div className="text-xs font-black text-pink-900 leading-tight">{todayCalWed.sector}</div>
                      </div>
                    )}
                    {(!todayCalMon || todayCalMon.isOff) && (!todayCalWed || todayCalWed.isOff) && (
                      <div className="text-xs text-gray-400">Volno</div>
                    )}
                  </div>
                );
              })()}
              <MonthlyOccupancy data={data} />
              </div>
              <div className="hidden lg:block space-y-3">
                <StatsPanel stats={computeStats()} team={team} />
                <RemovalStatsPanel stats={computeRemovalStats()} />
              </div>
            </div>

          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
